<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강남펄스 ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
  :root{
    --brand:#0f766e; --brand-2:#14b8a6; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --card:#fff; --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Malgun Gothic',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f766e,#0d9488 60%,#0891b2)}
  .login-card{background:#fff;width:360px;padding:36px 32px;border-radius:16px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 24px;color:var(--muted);font-size:13px}
  .login-card label{display:block;font-weight:600;margin:14px 0 6px;font-size:13px}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
  .login-card button{width:100%;margin-top:22px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:15px}
  .hint{margin-top:16px;font-size:12px;color:var(--muted);background:#f8fafc;padding:10px;border-radius:8px;border:1px solid var(--line);line-height:1.6}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px}
  #app{display:none;min-height:100vh}
  .layout{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .side{background:#0f172a;color:#cbd5e1;padding:20px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{font-size:18px;font-weight:800;color:#fff;padding:4px 10px 16px;letter-spacing:-.5px}
  .brand small{display:block;font-size:11px;color:#5eead4;font-weight:600;margin-top:3px}
  .nav a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;color:#cbd5e1;text-decoration:none;font-weight:600;margin-bottom:2px;font-size:13.5px;cursor:pointer}
  .nav a:hover{background:#1e293b;color:#fff}
  .nav a.active{background:var(--brand);color:#fff}
  .nav .ico{width:16px;text-align:center}
  .nav .grp{font-size:10px;color:#64748b;padding:14px 12px 4px;font-weight:700;letter-spacing:.6px}
  .side .who{margin-top:16px;font-size:12px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:12px}
  .side .who b{color:#e2e8f0;display:block;font-size:13px}
  .side .who button{margin-top:8px;width:100%;background:#1e293b;color:#cbd5e1;border:none;padding:7px;border-radius:7px;font-size:12px}
  .main{padding:24px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .page-head h2{margin:0;font-size:20px}
  .page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:7px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fee2e2;color:var(--danger)}
  .btn.ok{background:#16a34a}
  .btn.kakao{background:#FEE500;color:#3C1E1E}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat.clk{cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .stat.clk:hover{border-color:var(--brand);box-shadow:0 3px 10px rgba(15,118,110,.15)}
  .stat .k{color:var(--muted);font-size:13px;font-weight:600}
  .stat .v{font-size:23px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .panel .pb{padding:4px 2px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f8fafc}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .t-booked{background:#e0e7ff;color:#4338ca}.t-confirmed{background:#dbeafe;color:#1d4ed8}
  .t-checked_in{background:#fef9c3;color:#a16207}.t-in_progress{background:#ffedd5;color:#c2410c}
  .t-done{background:#dcfce7;color:#15803d}.t-no_show{background:#f1f5f9;color:#64748b}.t-cancelled{background:#fee2e2;color:#b91c1c}
  .t-paid{background:#dcfce7;color:#15803d}.t-partial{background:#fef9c3;color:#a16207}
  .t-unpaid{background:#fee2e2;color:#b91c1c}.t-refunded{background:#f1f5f9;color:#64748b}.t-quote{background:#e0e7ff;color:#4338ca}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .search{flex:1;min-width:160px}
  .srch{position:relative;display:inline-block}
  .srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;pointer-events:none}
  .srch input{padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:9px;background:#fff;min-width:180px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:16px;width:540px;max-width:100%;max-height:92vh;overflow:auto}
  .modal.lg{width:920px}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:800;font-size:17px;display:flex;justify-content:space-between}
  .modal .mh span{cursor:pointer;color:var(--muted)}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px}
  .field textarea{min-height:56px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
  .muted{color:var(--muted)}.right{text-align:right}
  .detail-sec{margin-bottom:16px}
  .detail-sec h4{margin:0 0 8px;font-size:13px;color:var(--brand)}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 10px;font-size:13.5px}
  .kv .k{color:var(--muted)}
  .note-box{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .cny{color:var(--muted);font-size:12px}
  .stat-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .stat-tabs button{padding:8px 15px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:600;color:var(--muted)}
  .stat-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  @media print{.side{display:none!important}.layout{grid-template-columns:1fr!important}.page-head button,.page-head input,.stat-tabs,.toolbar{display:none!important}.modal-bg{display:none!important}}
  /* quote */
  .quote-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:start}
  .pricelist{max-height:60vh;overflow:auto}
  .pl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .pl-row:hover{background:#f0fdfa}
  .pl-row .nm{font-weight:600}.pl-row .zh{color:var(--muted);font-size:12px}
  .cart-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
  .ldisc{font-size:12px;color:var(--muted);white-space:nowrap}.ldisc input{width:46px;padding:4px;border:1px solid var(--line);border-radius:6px;text-align:right;margin-right:2px}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;font-weight:700}
  .totrow{display:flex;justify-content:space-between;padding:6px 12px;font-size:14px}
  .totrow.big{font-size:20px;font-weight:800;padding:12px;border-top:2px solid var(--ink);margin-top:4px}
  .chip{display:inline-block;background:#f1f5f9;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  /* calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{text-align:center;font-size:12px;color:var(--muted);font-weight:700;padding:4px}
  .cal .cell{min-height:78px;border:1px solid var(--line);border-radius:9px;padding:6px;background:#fff;cursor:pointer;position:relative}
  .cal .cell:hover{border-color:var(--brand)}
  .cal .cell.other{background:#f8fafc;color:#cbd5e1}
  .cal .cell.today{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
  .cal .dnum{font-size:12px;font-weight:700}
  .cal .ev{font-size:11px;background:#e0f2f1;color:#0f766e;border-radius:5px;padding:1px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal .more{font-size:11px;color:var(--muted);margin-top:2px}
  .pb{overflow-x:auto}
  #menuBtn{display:none;position:fixed;top:10px;left:10px;z-index:70;background:#0f172a;color:#fff;border:none;width:42px;height:42px;border-radius:10px;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  @media(max-width:900px){
    #menuBtn{display:block}
    .layout{grid-template-columns:1fr}
    .side{position:fixed;left:-240px;top:0;bottom:0;height:100vh;width:216px;z-index:60;transition:left .25s ease;box-shadow:4px 0 16px rgba(0,0,0,.35)}
    .side.open{left:0}
    .main{padding:60px 16px 24px}
    .cards{grid-template-columns:repeat(2,1fr)!important}
    .quote-wrap{grid-template-columns:1fr!important}
    [style*="grid-template-columns:1fr 1fr"],[style*="grid-template-columns:1.1fr 1fr"]{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
    .grid2,.grid3{grid-template-columns:1fr}
    .page-head h2{font-size:18px}
    .modal.lg{width:100%}
  }
  @media(max-width:560px){
    .cards{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:1fr!important}
    .main{padding:58px 12px 20px}
    th,td{padding:9px 10px}
  }
</style>
</head>
<body>
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <h1>강남펄스 <span style="color:#0f766e">ERP</span></h1>
    <p>의료관광 상담·시술·정산 통합 시스템</p>
    <label>이메일</label><input id="email" type="email" value="admin@gangnam.clinic" autocomplete="username" />
    <label>비밀번호</label><input id="pw" type="password" value="gangnam1234" autocomplete="current-password" />
    <button id="loginBtn" type="submit">로그인</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">데모 계정 · <b>admin@gangnam.clinic</b> / <b>gangnam1234</b></div>
  </form>
</div>

<div id="app">
  <button id="menuBtn" onclick="toggleSide()">☰</button>
  <div id="backdrop" onclick="toggleSide(false)"></div>
  <div class="layout">
    <aside class="side">
      <div class="brand" style="cursor:pointer" onclick="location.reload()" title="새로고침">강남펄스<small id="hospName">ERP</small></div>
      <nav class="nav" id="nav">
        <a data-view="dashboard" class="active">대시보드</a>
        <div class="grp">진료 · 접수</div>
        <a data-view="calendar">예약 캘린더</a>
        <a data-view="reception">접수 현황</a>
        <a data-view="patients">환자 CRM</a>
        <a data-view="quote">상담 · 견적</a>
        <a data-view="charts">진료차트</a>
        <a data-view="billing">수납 · 매출</a>
        <div class="grp">매출 · 정산</div>
        <a data-view="stats">통계</a>
        <a data-view="settlement">에이전시 정산</a>
        <a data-view="refsettle">소개자 정산</a>
        <div class="grp">거래처 · 상품</div>
        <a data-view="agencies">에이전시 관리</a>
        <a data-view="referrers">왕홍 · 소개자</a>
        <a data-view="packages">패키지 관리</a>
        <div class="grp owner-only">관리자</div>
        <a data-view="staff" class="owner-only">직원 관리</a>
        <a data-view="settings" class="owner-only">병원 설정</a>
        <a data-view="audit" class="owner-only">관리자 로그</a>
      </nav>
      <div class="who"><b id="whoName">-</b><span id="whoRole" class="muted"></span>
        <button onclick="doLogout()">로그아웃</button><div id="appVer" style="margin-top:10px;font-size:11px;color:#475569;text-align:center"></div></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
const SB_URL="https://fhuninzvrkzodhvwkxvo.supabase.co";
const SB_KEY="sb_publishable_DqrHtdkvc-0VnN511-QdnQ_RuC-fbJ4";
const db=supabase.createClient(SB_URL,SB_KEY);
const APP_VERSION='v1.4.2 · 2026-07-08';
let curView='dashboard';
const KRW_PER_CNY=218; // 환율(대략) : CNY = KRW / 218

const STATUS_LABEL={booked:'예약',confirmed:'확정',checked_in:'접수완료',in_progress:'진료중',done:'완료',no_show:'노쇼',cancelled:'취소'};
const PAY_LABEL={unpaid:'미수납',partial:'부분납',paid:'완납',refunded:'환불'};
const ORD_LABEL={quote:'견적',confirmed:'확정',done:'완료',cancelled:'취소'};
const state={hospital_id:null,hospital_name:'강남펄스',staff:null,procedures:[],patients:[],agencies:[],discounts:[],packages:[],referrers:[]};

const won=n=>'₩'+Number(n||0).toLocaleString('ko-KR');
const cny=n=>'¥'+Math.round(Number(n||0)/KRW_PER_CNY).toLocaleString('ko-KR');
const methodBadge=m=>m?`<span class="tag" style="background:#eef2ff;color:#4338ca;margin-left:4px">${esc(m)}</span>`:'';
const fdate=s=>s?new Date(s).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'-';
const ftime=s=>s?new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
const fdt=s=>s?`${fdate(s)} ${ftime(s)}`:'-';
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const MAG='<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>';
function keepFocus(id){setTimeout(function(){const i=el(id);if(i){const v=i.value;i.focus();try{i.setSelectionRange(v.length,v.length);}catch(e){}}},0);}
const pmap=()=>Object.fromEntries(state.patients.map(p=>[p.id,p.name]));
const amap=()=>Object.fromEntries(state.agencies.map(a=>[a.id,a.name]));
let billSearch='',billSort='recent',billFrom='',billTo='';let setlSearch='',setlSort='rev';let rsSearch='',rsSort='rev';let agmSearch='',agmSort='name';let refmSearch='',refmSort='name';let chSearch='',chSort='date';let setlVat=true,rsVat=true;

async function doLogin(e){e.preventDefault();const b=el('loginBtn');b.disabled=true;el('loginErr').textContent='';
  const {error}=await db.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});
  if(error){el('loginErr').textContent='로그인 실패: '+(error.message||error);b.disabled=false;return;}await boot();}
async function doLogout(){await db.auth.signOut();location.reload();}

async function boot(){
  const {data:{user}}=await db.auth.getUser();
  if(!user){el('login').style.display='flex';el('app').style.display='none';return;}
  const {data:staff}=await db.from('staff_accounts').select('id,name,role,hospital_id').eq('id',user.id).single();
  if(!staff){el('loginErr').textContent='스태프 계정이 없습니다.';return;}
  state.staff=staff;state.hospital_id=staff.hospital_id;
  fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(j=>{state.ip=j.ip;}).catch(()=>{});
  const [{data:hosp},{data:procs},{data:ags},{data:dcs},{data:pkgs},{data:pkgItems}]=await Promise.all([
    db.from('hospitals').select('name').eq('id',staff.hospital_id).single(),
    db.from('procedures').select('*').eq('is_active',true).order('category').order('name'),
    db.from('agencies').select('*').order('name'),
    db.from('discount_codes').select('*').eq('is_active',true),
    db.from('packages').select('*').eq('is_active',true).order('ptype').order('name'),
    db.from('package_items').select('*').order('sort'),
  ]);
  if(hosp)state.hospital_name=hosp.name;
  state.procedures=procs||[];state.agencies=ags||[];state.discounts=dcs||[];
  state.packages=(pkgs||[]).map(p=>({...p,items:(pkgItems||[]).filter(i=>i.package_id===p.id)}));
  const {data:refs}=await db.from('referrers').select('*').eq('is_active',true).order('name');state.referrers=refs||[];
  el('hospName').textContent=state.hospital_name;
  el('appVer').textContent=APP_VERSION;
  el('whoName').textContent=staff.name;
  el('whoRole').textContent=({owner:'원장',manager:'매니저',desk:'데스크',viewer:'열람'})[staff.role]||staff.role;
  const _allm=['dashboard','calendar','reception','patients','quote','charts','billing','stats','settlement','agencies','packages','referrers','refsettle','staff','settings','audit'];
  let _allowed=(staff.role==='owner')?_allm:((Array.isArray(staff.menu_perms)&&staff.menu_perms.length)?staff.menu_perms.slice():roleMenus(staff.role));
  if(staff.role!=='owner')_allowed=_allowed.filter(k=>k!=='staff'&&k!=='settings'&&k!=='audit');
  document.querySelectorAll('#nav a').forEach(a=>{a.style.display=_allowed.includes(a.dataset.view)?'':'none';});
  if(staff.role!=='owner')document.querySelectorAll('.nav .grp.owner-only').forEach(e=>e.style.display='none');
  el('login').style.display='none';el('app').style.display='block';
  await loadPatients();navTo('dashboard');setTimeout(()=>logAudit('로그인'),800);
}
async function loadPatients(){const {data}=await db.from('patients').select('*').order('name');state.patients=data||[];}

el('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a)navTo(a.dataset.view);});
function navTo(v){curView=v;toggleSide(false);document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.view===v));

function openModal(html,lg){el('modal').className='modal'+(lg?' lg':'');el('modal').innerHTML=html;el('modalBg').style.display='flex';}

/* ============ DASHBOARD ============ */
async function renderDashboard(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const ds=new Date(y,mo,now.getDate()).toISOString(),de=new Date(y,mo,now.getDate()+1).toISOString();
  const ms=new Date(y,mo,1).toISOString(),me=new Date(y,mo+1,1).toISOString();
  const trendStart=new Date(y,mo-5,1).toISOString();
  const [appt,monOrders,pat,recent,trend]=await Promise.all([
    db.from('appointments').select('*').gte('appointment_at',ds).lt('appointment_at',de).order('appointment_at'),
    db.from('orders').select('total,pay_status,order_date,status').gte('order_date',ms).lt('order_date',me).neq('status','cancelled'),
    db.from('patients').select('id',{count:'exact',head:true}),
    db.from('orders').select('*').order('order_date',{ascending:false}).limit(6),
    db.from('orders').select('total,order_date,status').gte('order_date',trendStart).neq('status','cancelled'),
  ]);
  const appts=appt.data||[],mons=monOrders.data||[];
  const monSales=mons.reduce((s,o)=>s+Number(o.total||0),0);
  const unpaid=mons.filter(o=>o.pay_status!=='paid').reduce((s,o)=>s+Number(o.total||0),0);
  const PM=pmap(),AM=amap();
  const months=[];for(let k=5;k>=0;k--){const d=new Date(y,mo-k,1);months.push({key:d.getFullYear()+'-'+(d.getMonth()+1),label:(d.getMonth()+1)+'월',sum:0});}
  (trend.data||[]).forEach(o=>{const d=new Date(o.order_date);const key=d.getFullYear()+'-'+(d.getMonth()+1);const mm=months.find(x=>x.key===key);if(mm)mm.sum+=Number(o.total||0);});
  const maxSum=Math.max(1,...months.map(x=>x.sum));
  const chart=`<div style="display:flex;align-items:flex-end;gap:14px;height:180px;padding:16px 12px 4px">${months.map(x=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
     <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${x.sum?(Math.round(x.sum/10000)+'만'):''}</div>
     <div style="width:58%;background:linear-gradient(180deg,#14b8a6,#0f766e);border-radius:6px 6px 0 0;height:${Math.round(x.sum/maxSum*130)}px;min-height:${x.sum?4:0}px"></div>
     <div style="font-size:12px;color:var(--muted);margin-top:6px">${x.label}</div></div>`).join('')}</div>`;
  m.innerHTML=`
   <div class="page-head"><div><h2>대시보드</h2>
     <div class="sub">${esc(state.hospital_name)} · ${now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div></div></div>
   <div class="cards">
     <div class="stat clk" onclick="navTo('reception')" title="접수 현황으로"><div class="k">오늘 예약</div><div class="v">${appts.length}<small> 건</small></div></div>
     <div class="stat clk" onclick="navTo('billing')" title="수납·매출로"><div class="k">이번달 매출</div><div class="v">${won(monSales)}</div><div class="cny">${cny(monSales)}</div></div>
     <div class="stat clk" onclick="billSort='unpaid';navTo('billing')" title="미수 먼저 보기"><div class="k">미수금</div><div class="v" style="color:var(--danger)">${won(unpaid)}</div></div>
     <div class="stat clk" onclick="navTo('patients')" title="환자 CRM으로"><div class="k">전체 환자</div><div class="v">${pat.count||0}<small> 명</small></div></div>
   </div>
   <div class="panel"><div class="ph">최근 6개월 매출 추이</div>${chart}</div>
   <div class="panel"><div class="ph">오늘 예약 <button class="btn sm" onclick="navTo('reception')">접수 →</button></div>
     <div class="pb">${appts.length?`<table><thead><tr><th>시간</th><th>환자</th><th>담당</th><th>상태</th></tr></thead><tbody>${
       appts.map(a=>`<tr><td>${ftime(a.appointment_at)}</td><td>${esc(PM[a.patient_id]||'환자')}</td><td>${esc(a.doctor||'-')}</td><td><span class="tag t-${a.status}">${STATUS_LABEL[a.status]}</span></td></tr>`).join('')
     }</tbody></table>`:'<div class="empty">오늘 예약이 없습니다.</div>'}</div></div>
   <div class="panel"><div class="ph">최근 상담·견적 <button class="btn sm" onclick="navTo('billing')">수납 →</button></div>
     <div class="pb">${(recent.data||[]).length?`<table><thead><tr><th>No</th><th>환자</th><th>에이전시</th><th class="right">금액</th><th>수납</th></tr></thead><tbody>${
       recent.data.map(o=>`<tr><td>#${o.order_no}</td><td>${esc(PM[o.patient_id]||'-')}</td><td>${esc(AM[o.agency_id]||'-')}</td><td class="right">${won(o.total)}</td><td><span class="tag t-${o.pay_status}">${PAY_LABEL[o.pay_status]}</span>${o.pay_status==='paid'?methodBadge(o.pay_method):''}</td></tr>`).join('')
     }</tbody></table>`:'<div class="empty">견적이 없습니다.</div>'}</div></div>`;
}

/* ============ CALENDAR ============ */
let calYM=null;
async function renderCalendar(){
  const now=new Date();if(!calYM)calYM={y:now.getFullYear(),m:now.getMonth()};
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const {y,m:mo}=calYM;
  const start=new Date(y,mo,1),end=new Date(y,mo+1,1);
  const {data}=await db.from('appointments').select('*').gte('appointment_at',start.toISOString()).lt('appointment_at',end.toISOString()).order('appointment_at');
  const PM=pmap();const byDay={};(data||[]).forEach(a=>{const d=new Date(a.appointment_at).getDate();(byDay[d]=byDay[d]||[]).push(a);});
  const firstDow=start.getDay(),days=new Date(y,mo+1,0).getDate();
  const todayD=(now.getFullYear()===y&&now.getMonth()===mo)?now.getDate():-1;
  let cells='';for(let i=0;i<firstDow;i++)cells+='<div class="cell other"></div>';
  for(let d=1;d<=days;d++){const evs=byDay[d]||[];
    cells+=`<div class="cell${d===todayD?' today':''}" onclick="dayModal(${y},${mo},${d})"><div class="dnum">${d}</div>${
      evs.slice(0,3).map(a=>`<div class="ev">${ftime(a.appointment_at)} ${esc(PM[a.patient_id]||'')}</div>`).join('')}${
      evs.length>3?`<div class="more">+${evs.length-3}</div>`:''}</div>`;}
  m.innerHTML=`
   <div class="page-head"><div><h2>예약 캘린더</h2><div class="sub">날짜를 클릭하면 예약을 보고 추가할 수 있어요</div></div>
     <div><button class="btn ghost sm" onclick="calMove(-1)">◀</button>
       <b style="margin:0 12px">${y}년 ${mo+1}월</b>
       <button class="btn ghost sm" onclick="calMove(1)">▶</button>
       <button class="btn sm" style="margin-left:10px" onclick="apptModal()">+ 예약</button></div></div>
   <div class="panel"><div class="pb" style="padding:14px">
     <div class="cal">${['일','월','화','수','목','금','토'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div>
   </div></div>`;
}
function calMove(d){calYM.m+=d;if(calYM.m<0){calYM.m=11;calYM.y--;}if(calYM.m>11){calYM.m=0;calYM.y++;}renderCalendar();}
async function dayModal(y,mo,d){
  const ds=new Date(y,mo,d).toISOString(),de=new Date(y,mo,d+1).toISOString();
  const {data}=await db.from('appointments').select('*').gte('appointment_at',ds).lt('appointment_at',de).order('appointment_at');
  const PM=pmap(),PR=Object.fromEntries(state.procedures.map(p=>[p.id,p.name]));
  openModal(`<div class="mh">${y}.${mo+1}.${d} 예약<span onclick="closeModal()">✕</span></div>
   <div class="mb">${(data||[]).length?`<table><tbody>${data.map(a=>`<tr><td>${ftime(a.appointment_at)}</td><td><b>${esc(PM[a.patient_id]||'-')}</b></td><td>${esc(PR[a.procedure_id]||'')}</td><td>${esc(a.doctor||'')}</td><td><span class="tag t-${a.status}">${STATUS_LABEL[a.status]}</span></td></tr>`).join('')}</tbody></table>`:'<div class="empty">예약 없음</div>'}</div>
   <div class="mf"><button class="btn ghost" onclick="closeModal()">닫기</button>
     <button class="btn" onclick="apptModal('${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')">+ 이 날짜에 예약</button></div>`);
}

async function renderReception(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const now=new Date();const ds=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
  const de=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).toISOString();
  const {data}=await db.from('appointments').select('*').gte('appointment_at',ds).lt('appointment_at',de).order('appointment_at');
  const PM=pmap(),PR=Object.fromEntries(state.procedures.map(p=>[p.id,p.name]));
  const AM=amap();const PA=Object.fromEntries(state.patients.map(p=>[p.id,p.source_agency_id]));
  const rows=(data||[]).map(a=>`<tr><td>${ftime(a.appointment_at)}</td><td><b>${esc(PM[a.patient_id]||'-')}</b></td>
    <td>${esc(AM[PA[a.patient_id]]||'-')}</td>
    <td>${esc(PR[a.procedure_id]||'-')}</td><td>${esc(a.doctor||'-')}</td>
    <td><span class="tag t-${a.status}">${STATUS_LABEL[a.status]}</span></td><td class="muted">${esc(a.memo||'')}</td>
    <td class="right">${nextBtns(a)}</td></tr>`).join('');
  m.innerHTML=`<div class="page-head"><div><h2>접수 현황</h2><div class="sub">오늘 ${now.toLocaleDateString('ko-KR')}</div></div>
     <button class="btn" onclick="apptModal()">+ 예약 등록</button></div>
   <div class="panel"><div class="pb">${(data||[]).length?`<table><thead><tr><th>시간</th><th>환자</th><th>에이전시</th><th>시술</th><th>담당</th><th>상태</th><th>메모</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">오늘 예약이 없습니다.</div>'}</div></div>`;
}
function nextBtns(a){const flow={booked:'checked_in',confirmed:'checked_in',checked_in:'in_progress',in_progress:'done'};let o='';
  if(flow[a.status])o+=`<button class="btn sm" onclick="setAppt('${a.id}','${flow[a.status]}')">${STATUS_LABEL[flow[a.status]]}</button> `;
  if(a.status!=='cancelled'&&a.status!=='done')o+=`<button class="btn sm ghost" onclick="setAppt('${a.id}','no_show')">노쇼</button>`;return o;}
async function setAppt(id,s){await db.from('appointments').update({status:s,updated_at:new Date().toISOString()}).eq('id',id);renderReception();}
function apptModal(dateStr){
  const pOpt=state.patients.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const prOpt='<option value="">(미정)</option>'+state.procedures.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const base=dateStr?dateStr+'T10:00':new Date(Date.now()-new Date().getTimezoneOffset()*6e4).toISOString().slice(0,16);
  openModal(`<div class="mh">예약 등록<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="field"><label>환자 *</label><select id="f_pat">${pOpt}</select></div>
    <div class="grid2"><div class="field"><label>예약일시 *</label><input id="f_at" type="datetime-local" value="${base}"></div>
      <div class="field"><label>담당의</label><input id="f_doc" placeholder="예: 박성형"></div></div>
    <div class="field"><label>예정 시술</label><select id="f_proc">${prOpt}</select></div>
    <div class="field"><label>메모</label><textarea id="f_memo"></textarea></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="saveAppt()">저장</button></div>`);
}
async function saveAppt(){const row={hospital_id:state.hospital_id,patient_id:el('f_pat').value,appointment_at:new Date(el('f_at').value).toISOString(),doctor:el('f_doc').value||null,procedure_id:el('f_proc').value||null,memo:el('f_memo').value||null,status:'booked'};
  const {error}=await db.from('appointments').insert(row);if(error){alert('저장 실패: '+error.message);return;}logAudit('예약 등록');closeModal();navTo('calendar');}

/* ============ PATIENTS ============ */
let patAgg={};
function visitLabel(n){return n<=0?'신규':(n===1?'초진':(n===2?'재진':n+'회'));}
async function renderPatients(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';await loadPatients();
  const {data:ords}=await db.from('orders').select('patient_id,total,status').neq('status','cancelled');
  patAgg={};(ords||[]).forEach(o=>{const a=patAgg[o.patient_id]=patAgg[o.patient_id]||{cnt:0,sum:0};a.cnt++;a.sum+=Number(o.total||0);});
  m.innerHTML=`<div class="page-head"><div><h2>환자 CRM</h2><div class="sub">전체 ${state.patients.length}명 · 클릭하면 상세 프로필</div></div>
     <button class="btn" onclick="patientModal()">+ 환자 등록</button></div>
   <div class="toolbar"><div class="srch">${MAG}<input id="patSearch" placeholder="이름/영문명 검색…" oninput="filterPatients()"></div>
     <select id="patNat" onchange="filterPatients()"><option value="">국적 전체</option>${[...new Set(state.patients.map(p=>p.nationality).filter(Boolean))].map(n=>`<option>${esc(n)}</option>`).join('')}</select>
     <select id="patYear" onchange="filterPatients()"><option value="">생년 전체</option>${[...new Set(state.patients.map(p=>p.birth_date&&p.birth_date.slice(0,4)).filter(Boolean))].sort().reverse().map(y=>`<option>${y}</option>`).join('')}</select>
     <select id="patSort" onchange="filterPatients()"><option value="name">이름순</option><option value="sum">누적 많은순</option><option value="cnt">방문 많은순</option></select></div>
   <div class="panel"><div class="pb" id="patTable"></div></div>`;
  filterPatients();
}
function drawPatients(list){const AM=amap();const t=el('patTable');
  if(!list.length){t.innerHTML='<div class="empty">환자가 없습니다.</div>';return;}
  t.innerHTML=`<table><thead><tr><th>이름</th><th>회차</th><th>국적</th><th>연락처</th><th>소개 에이전시</th><th class="right">누적 시술</th><th></th></tr></thead><tbody>${
    list.map(p=>{const a=patAgg[p.id]||{cnt:0,sum:0};const vip=a.sum>=10000000;
    return `<tr><td><b>${esc(p.name)}</b>${vip?' <span class="tag" style="background:#fef3c7;color:#b45309">VIP</span>':''}${p.eng_name?` <span class="muted" style="font-weight:400">${esc(p.eng_name)}</span>`:''}</td>
      <td><span class="tag ${a.cnt>=3?'t-done':(a.cnt===2?'t-confirmed':(a.cnt===1?'t-booked':'t-no_show'))}">${visitLabel(a.cnt)}</span></td>
      <td>${esc(p.nationality||'-')}</td><td>${esc((p.contact&&p.contact.phone)||'-')}</td>
      <td>${esc(AM[p.source_agency_id]||'-')}</td>
      <td class="right">${won(a.sum)}</td>
      <td class="right"><button class="btn sm ghost" onclick="patientDetail('${p.id}')">상세</button></td></tr>`;}).join('')}</tbody></table>`;}
function filterPatients(){const q=(el('patSearch').value||'').trim().toLowerCase();const s=el('patSort')?el('patSort').value:'name';const nat=el('patNat')?el('patNat').value:'';const yr=el('patYear')?el('patYear').value:'';const g=id=>patAgg[id]||{cnt:0,sum:0};
  let l=state.patients.filter(p=>(!q||p.name.toLowerCase().includes(q)||(p.eng_name||'').toLowerCase().includes(q))&&(!nat||p.nationality===nat)&&(!yr||(p.birth_date&&p.birth_date.slice(0,4)===yr)));
  l.sort((a,b)=>s==='sum'?g(b.id).sum-g(a.id).sum:s==='cnt'?g(b.id).cnt-g(a.id).cnt:a.name.localeCompare(b.name));drawPatients(l);}
function patientModal(id){const p=id?state.patients.find(x=>x.id===id):null;const pm=(p&&p.contact)||{};
  const aOpt='<option value="">(없음)</option>'+state.agencies.map(a=>`<option value="${a.id}" ${p&&p.source_agency_id===a.id?'selected':''}>${esc(a.name)}</option>`).join('');
  openModal(`<div class="mh">${p?'환자 정보 수정':'환자 등록'}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="grid2"><div class="field"><label>이름 *</label><input id="p_name" value="${p?esc(p.name):''}"></div><div class="field"><label>영문명</label><input id="p_eng" value="${p?esc(p.eng_name||''):''}" placeholder="WANG XIAOXIAO"></div></div>
    <div class="grid3"><div class="field"><label>성별</label><select id="p_gender"><option value="">-</option><option ${p&&p.gender==='여'?'selected':''}>여</option><option ${p&&p.gender==='남'?'selected':''}>남</option></select></div>
      <div class="field"><label>생년월일</label><input id="p_birth" type="date" value="${p&&p.birth_date?p.birth_date:''}"></div>
      <div class="field"><label>국적</label><input id="p_nat" value="${p?esc(p.nationality||''):'중국'}"></div></div>
    <div class="grid2"><div class="field"><label>연락처</label><input id="p_phone" value="${esc(pm.phone||'')}"></div><div class="field"><label>소개 에이전시</label><select id="p_ag">${aOpt}</select></div></div>
    <div class="field"><label>유입경로</label><input id="p_src" value="${p?esc(p.source_channel||''):''}" placeholder="예: 왕홍소개, 샤오홍슈"></div>
    <div class="field" style="border-top:1px solid var(--line);padding-top:10px;margin-bottom:2px"><label style="color:var(--brand)">의료관광 정보</label></div>
    <div class="grid2"><div class="field"><label>여권번호</label><input id="p_pass" value="${p?esc(p.passport_no||''):''}"></div><div class="field"><label>비자유형</label><input id="p_visa" value="${p?esc(p.visa_type||''):''}" placeholder="관광/의료"></div></div>
    <div class="grid2"><div class="field"><label>입국일</label><input id="p_arr" type="date" value="${p&&p.arrival_date?p.arrival_date:''}"></div><div class="field"><label>출국일</label><input id="p_dep" type="date" value="${p&&p.departure_date?p.departure_date:''}"></div></div>
    <div class="grid2"><div class="field"><label>통역</label><input id="p_intp" value="${p?esc(p.interpreter||''):''}"></div><div class="field"><label>태그(쉼표 구분)</label><input id="p_tags" value="${p&&p.tags?esc(p.tags.join(', ')):''}" placeholder="VIP, 재방문"></div></div>
    <div class="field"><label>주소</label><input id="p_addr" value="${p?esc(p.address||''):''}"></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="savePatient('${id||''}')">저장</button></div>`,true);}
async function savePatient(id){const name=el('p_name').value.trim();if(!name){alert('이름을 입력하세요');return;}
  const tags=(el('p_tags').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const row={hospital_id:state.hospital_id,name,eng_name:el('p_eng').value||null,gender:el('p_gender').value||null,birth_date:el('p_birth').value||null,nationality:el('p_nat').value||null,contact:{phone:el('p_phone').value||''},source_agency_id:el('p_ag').value||null,source_channel:el('p_src').value||null,passport_no:el('p_pass').value||null,visa_type:el('p_visa').value||null,arrival_date:el('p_arr').value||null,departure_date:el('p_dep').value||null,interpreter:el('p_intp').value||null,address:el('p_addr').value||null,tags};
  let error;
  if(id){({error}=await db.from('patients').update(row).eq('id',id));}
  else{row.first_visit=new Date().toISOString().slice(0,10);({error}=await db.from('patients').insert(row));}
  if(error){alert('저장 실패: '+error.message);return;}

function drawPrice(){

       <div class="right"><div><b>${won(p.total_price)}</b></div><div class="cny">${cny(p.total_price)}</div></div>
     </div>`).join('')||'<div class="empty">패키지 없음</div>';

  }
  let list=state.procedures.filter(p=>(!curCat||p.category===curCat)&&(!q||p.name.toLowerCase().includes(q)||(p.name_zh||'').toLowerCase().includes(q)));

function addItem(pid){const p=state.procedures.find(x=>x.id===pid);if(!p)return;
  const ex=cart.find(c=>c.procedure_id===pid);if(ex)ex.qty++;else cart.push({procedure_id:pid,name:p.name,unit_price:Number(p.price),qty:1});
  drawCart();}

  const key='pkg:'+id;const ex=cart.find(c=>c.pkey===key);if(ex)ex.qty++;

function lineNet(c){return Math.round(c.unit_price*c.qty*(1-(c.dpct||0)/100));}
function setDisc(i,v){cart[i].dpct=Math.max(0,Math.min(100,Number(v)||0));var e=el('lnet_'+i);if(e)e.textContent=won(lineNet(cart[i]));calcQuote();}
function drawCart(){
  el('q_cart').innerHTML=cart.length?cart.map((c,i)=>`<div class="cart-item">
     <div><b>${esc(c.name)}</b><div class="cny">${won(c.unit_price)}</div></div>
     <div class="qty"><button onclick="chQty(${i},-1)">−</button><b>${c.qty}</b><button onclick="chQty(${i},1)">+</button></div>
     <div class="ldisc"><input type="number" min="0" max="100" value="${c.dpct||0}" oninput="setDisc(${i},this.value)" title="이 시술 할인%">%</div>
     <div class="right"><b id="lnet_${i}">${won(lineNet(c))}</b></div>
     <button class="btn sm danger" onclick="chQty(${i},-99)">×</button></div>`).join(''):'<div class="empty" style="padding:20px">시술을 담아주세요</div>';
  calcQuote();

function calcQuote(){
  const sub=cart.reduce((s,c)=>s+lineNet(c),0);
  const kind=el('q_dkind').value;let val=Number(el('q_dval').value||0);let disc=0;
  if(kind==='percent')disc=Math.round(sub*Math.min(val,100)/100);else if(kind==='fixed')disc=Math.min(val,sub);
  const total=sub-disc;
  el('q_tot').innerHTML=`<div class="totrow"><span class="muted">소계</span><span>${won(sub)}</span></div>
    ${disc>0?`<div class="totrow" style="color:var(--danger)"><span>할인</span><span>-${won(disc)}</span></div>`:''}
    <div class="totrow big"><span>합계</span><span>${won(total)} <span class="cny" style="font-size:13px">${cny(total)}</span></span></div>`;
  quoteCtx.subtotal=sub;quoteCtx.discount_amount=disc;quoteCtx.total=total;quoteCtx.discount_kind=kind;quoteCtx.discount_value=val;
}

  if(!w){alert('팝업이 차단되었습니다. 브라우저에서 팝업을 허용한 뒤 다시 눌러주세요.');return;}

/* ---- 카카오톡 전송 ---- */
function kakaoKey(){return localStorage.getItem('kakao_js_key')||'';}
function ensureKakao(){
  const k=kakaoKey();
  if(k&&window.Kakao&&!Kakao.isInitialized()){try{Kakao.init(k);}catch(e){}}
  return !!(window.Kakao&&Kakao.isInitialized&&Kakao.isInitialized());
}
function quoteText(){
  const p=state.patients.find(x=>x.id===el('q_pat').value);
  const ag=state.agencies.find(x=>x.id===el('q_ag').value);
  const doc=el('q_doc').value||'';
  const sub=quoteCtx.subtotal,disc=quoteCtx.discount_amount,total=quoteCtx.total;
  const now=new Date();
  let t=`[${state.hospital_name}] 견적서\n`;
  t+=`발행일: ${now.toLocaleDateString('ko-KR')}\n`;
  t+=`환자: ${p?p.name:'-'}${doc?' / 담당의: '+doc:''}\n`;
  if(ag)t+=`에이전시: ${ag.name}\n`;
  t+=`──────────────\n`;
  cart.forEach(c=>{const net=lineNet(c);const dpct=c.dpct||0;t+=`• ${c.name} ×${c.qty}${dpct?' ('+dpct+'%↓)':''} : ${won(net)}\n`;});
  t+=`──────────────\n`;
  t+=`소계: ${won(sub)}\n`;
  if(disc>0)t+=`할인: -${won(disc)}\n`;
  t+=`합계: ${won(total)} (${cny(total)})\n\n`;
  t+=`※ 본 견적은 상담 기준 금액이며, 실제 시술 내용에 따라 변동될 수 있습니다.`;
  return t;
}
async function sendKakao(){
  if(!cart.length){alert('시술을 담아주세요');return;}
  if(!el('q_pat').value){alert('환자를 선택하세요');return;}
  calcQuote();
  const text=quoteText();
  // 1) 카카오 JS 키가 설정된 경우: 카카오톡 공유(수신자 선택 후 전송)
  if(ensureKakao()){
    try{
      Kakao.Share.sendDefault({
        objectType:'text',
        text:text,
        link:{mobileWebUrl:location.href,webUrl:location.href}
      });
      logAudit('카카오톡 견적 전송',`#${el('q_pat').value.slice(0,8)} ${won(quoteCtx.total)}`);
      return;
    }catch(e){/* 실패 시 아래 복사 방식으로 폴백 */}
  }
  // 2) 폴백: 견적 내용을 클립보드에 복사 → 카카오톡 대화창에 붙여넣기
  let copied=false;
  try{await navigator.clipboard.writeText(text);copied=true;}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{copied=document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }
  logAudit('카카오톡 견적 전송(복사)',`${won(quoteCtx.total)}`);
  alert(copied
    ? '견적 내용이 클립보드에 복사되었습니다.\n카카오톡 대화창에 붙여넣기(Ctrl+V) 후 전송하세요.'
    : '견적 내용:\n\n'+text);
}

  drawPkgRows();

function drawPkgRows(){
  el('pk_items').innerHTML=pkgRows.map((r,i)=>`<div style="display:grid;grid-template-columns:1fr 130px 60px 32px;gap:6px;margin-bottom:6px">
    <input placeholder="시술명" value="${esc(r.name)}" oninput="pkgSet(${i},'name',this.value)">
    <input type="number" placeholder="가격(원)" value="${r.price}" oninput="pkgSet(${i},'price',this.value)">
    <input type="number" placeholder="수량" value="${r.qty}" oninput="pkgSet(${i},'qty',this.value)">
    <button class="btn sm danger" onclick="pkgDelRow(${i})">×</button></div>`).join('');
  pkgTotal();
}
function pkgSet(i,k,v){pkgRows[i][k]=k==='name'?v:(Number(v)||0);pkgTotal();}
function pkgAddRow(){pkgRows.push({name:'',price:0,qty:1});drawPkgRows();}
function pkgDelRow(i){pkgRows.splice(i,1);if(!pkgRows.length)pkgRows.push({name:'',price:0,qty:1});drawPkgRows();}
function pkgTotal(){const t=pkgRows.reduce((s,r)=>s+r.price*r.qty,0);el('pk_total').innerHTML=won(t)+' <span class="cny" style="font-size:13px">'+cny(t)+'</span>';return t;}
async function savePackage(id){
  const name=el('pk_name').value.trim();if(!name){alert('패키지명을 입력하세요');return;}
  const items=pkgRows.filter(r=>r.name.trim());if(!items.length){alert('구성 항목을 최소 1개 입력하세요');return;}
  const total=items.reduce((s,r)=>s+r.price*r.qty,0);
  const prow={hospital_id:state.hospital_id,name,ptype:el('pk_type').value||null,total_price:total,memo:el('pk_memo').value||null};
  let pkgId=id;
  if(id){const {error}=await db.from('packages').update(prow).eq('id',id);if(error){alert('저장 실패: '+error.message);return;}
    await db.from('package_items').delete().eq('package_id',id);}
  else{const {data,error}=await db.from('packages').insert(prow).select().single();if(error){alert('저장 실패: '+error.message);return;}pkgId=data.id;}
  const irows=items.map((r,idx)=>({hospital_id:state.hospital_id,package_id:pkgId,name:r.name,price:r.price,qty:r.qty,sort:idx+1}));
  const {error:e2}=await db.from('package_items').insert(irows);if(e2){alert('항목 저장 실패: '+e2.message);return;}
  logAudit('패키지 저장',name);closeModal();renderPackages();
}
async function delPackage(id){if(!confirm('이 패키지를 삭제할까요?'))return;
  await db.from('package_items').delete().eq('package_id',id);

  if(error){alert('삭제 실패: '+error.message);return;}logAudit('패키지 삭제');renderPackages();}

/* ============ REFERRER SETTLEMENT / 소개자 정산 ============ */
let refMonth=null;
async function renderRefSettle(){
  const now=new Date();if(!refMonth)refMonth=now.toISOString().slice(0,7);
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const y=+refMonth.slice(0,4),mo=+refMonth.slice(5,7)-1;
  const ms=new Date(y,mo,1).toISOString(),me=new Date(y,mo+1,1).toISOString();
  const [{data:orders},{data:setl},{data:refs}]=await Promise.all([
    db.from('orders').select('*').gte('order_date',ms).lt('order_date',me).neq('status','cancelled'),
    db.from('referrer_settlements').select('*').eq('period',refMonth),

let statMonth=null,statTab='sales',statFrom='',statTo='';
function statPreset(kind){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth(), d=now.getDate();
  const fmt=x=>{const yy=x.getFullYear(),mm=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return yy+'-'+mm+'-'+dd;};
  const today=new Date(y,mo,d);
  if(kind==='day'){ statFrom=fmt(today); statTo=fmt(today); }
  else if(kind==='week'){ const dow=(today.getDay()+6)%7; statFrom=fmt(new Date(y,mo,d-dow)); statTo=fmt(new Date(y,mo,d-dow+6)); }
  else if(kind==='month'){ statFrom=fmt(new Date(y,mo,1)); statTo=fmt(new Date(y,mo+1,0)); }
  else if(kind==='year'){ statFrom=fmt(new Date(y,0,1)); statTo=fmt(new Date(y,11,31)); }
  renderStats();
}

function sbars(entries,fmt,keepOrder){let arr=entries.slice();if(!keepOrder)arr.sort((a,b)=>b[1]-a[1]);const mx=Math.max(1,...arr.map(x=>x[1]));return arr.length?arr.map(([k,v])=>statBar(k,v,mx,fmt(v))).join(''):'<tr><td colspan=3 class="muted">데이터 없음</td></tr>';}

function exportAuditCSV(){const rows=(state._audit||[]).map(l=>[new Date(l.created_at).toLocaleString('ko-KR'),l.staff_name||'',menuLabel(l.menu),l.action,l.detail||'',l.ip||'']);const head=['시각','직원','메뉴','행위','상세','IP'];const q=c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`;const csv='﻿'+[head.map(q).join(',')].concat(rows.map(r=>r.map(q).join(','))).join('\n');const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='감사로그.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}

  const PM=pmap();const oMap=Object.fromEntries((orders||[]).map(o=>[o.id,o]));
  let lines=items.map(i=>{const o=oMap[i.order_id];return {date:o?o.order_date:null,patient:o?(PM[o.patient_id]||''):'',name:i.name,amount:Number(i.amount)};});
  lines.sort((x,y)=>new Date(x.date)-new Date(y.date));
  const total=lines.reduce((s,l)=>s+l.amount,0);
  const supply=vat?Math.round(total/1.1):total;const tax=vat?total-supply:0;
  const hc=(hosp&&hosp.contact)||{};
  const lineRows=lines.length?lines.map(l=>`<tr><td>${fdate(l.date)}</td><td>${esc(l.patient)}</td><td>${esc(l.name)}</td><td class="r">${won(l.amount)}</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">해당 기간 거래 내역이 없습니다.</td></tr>';
  const html=`<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>거래명세서 - ${esc(a.name)}</title>
   <style>body{font-family:'Malgun Gothic','Pretendard',sans-serif;color:#0f172a;padding:30px;max-width:760px;margin:auto}
   h1{font-size:24px;text-align:center;margin:0 0 4px;letter-spacing:8px}.period{text-align:center;color:#64748b;font-size:13px;margin-bottom:18px}
   .party{display:flex;gap:14px;margin-bottom:14px}.party>div{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.7}
   .party h3{margin:0 0 6px;font-size:12px;color:#0f766e}
   table{width:100%;border-collapse:collapse;margin-top:6px}th,td{border:1px solid #e2e8f0;padding:8px;font-size:12.5px;text-align:left}
   th{background:#0f766e;color:#fff}.r{text-align:right}
   .sum{margin-top:12px;margin-left:auto;width:300px}.sum div{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
   .sum .big{font-size:18px;font-weight:800;border-top:2px solid #0f172a;padding-top:8px;margin-top:4px}
   .note{margin-top:14px;color:#64748b;font-size:12px}.foot{margin-top:28px;text-align:center;color:#94a3b8;font-size:12px}
   @media print{body{padding:0}}</style></head><body>
   <h1>거 래 명 세 서</h1><div class="period">${from||''} ~ ${to||''}</div>
   <div class="party">
     <div><h3>공급자 (병원)</h3><b>${esc((hosp&&hosp.name)||state.hospital_name)}</b><br>사업자번호: ${esc((hosp&&hosp.biz_no)||'-')}<br>연락처: ${esc(hc.phone||hc.tel||'-')}</div>
     <div><h3>공급받는자 (에이전시)</h3><b>${esc(a.biz_company||a.name)}</b><br>사업자번호: ${esc(a.biz_no||'-')} / 대표: ${esc(a.biz_ceo||'-')}<br>${a.biz_type?'업태/종목: '+esc(a.biz_type)+'<br>':''}${a.biz_address?'주소: '+esc(a.biz_address)+'<br>':''}담당: ${esc(a.contact_name||'-')} ${a.phone?'('+esc(a.phone)+')':''}</div>
   </div>
   <table><thead><tr><th>일자</th><th>환자</th><th>시술명</th><th class="r">금액</th></tr></thead><tbody>${lineRows}</tbody></table>
   <div class="sum">${vat?`<div><span>공급가액</span><span>${won(supply)}</span></div><div><span>부가세(10%)</span><span>${won(tax)}</span></div>`:''}<div class="big"><span>합계 ${vat?'(VAT 포함)':'(VAT 별도)'}</span><span>${won(total)}</span></div></div>
   <div class="note">※ 상기 금액은 ${vat?'부가가치세가 포함된':'부가가치세 별도의'} 금액입니다. 본 명세서는 ${esc(a.name)}가 소개한 환자의 시술 거래 내역입니다.</div>
   <div class="foot">${esc((hosp&&hosp.name)||state.hospital_name)} · 발행일 ${new Date().toLocaleDateString('ko-KR')}</div>
   </body></html>`;
  const w=window.open('','_blank','width=820,height=920');
  if(!w){alert('팝업이 차단되었습니다. 팝업을 허용해주세요.');return;}
  w.document.write(html);w.document.close();w.focus();setTimeout(function(){w.print();},350);logAudit('거래명세서 출력',a.name);closeModal();
}
