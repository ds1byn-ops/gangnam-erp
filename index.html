<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강남펄스 ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
  :root{
    --brand:#0f766e; --brand-2:#14b8a6; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --card:#fff; --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Malgun Gothic',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f766e,#0d9488 60%,#0891b2)}
  .login-card{background:#fff;width:360px;padding:36px 32px;border-radius:16px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 24px;color:var(--muted);font-size:13px}
  .login-card label{display:block;font-weight:600;margin:14px 0 6px;font-size:13px}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
  .login-card button{width:100%;margin-top:22px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:15px}
  .hint{margin-top:16px;font-size:12px;color:var(--muted);background:#f8fafc;padding:10px;border-radius:8px;border:1px solid var(--line);line-height:1.6}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px}
  #app{display:none;min-height:100vh}
  .layout{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .side{background:#0f172a;color:#cbd5e1;padding:20px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{font-size:18px;font-weight:800;color:#fff;padding:4px 10px 16px;letter-spacing:-.5px}
  .brand small{display:block;font-size:11px;color:#5eead4;font-weight:600;margin-top:3px}
  .nav a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;color:#cbd5e1;text-decoration:none;font-weight:600;margin-bottom:2px;font-size:13.5px;cursor:pointer}
  .nav a:hover{background:#1e293b;color:#fff}
  .nav a.active{background:var(--brand);color:#fff}
  .nav .ico{width:16px;text-align:center}
  .nav .grp{font-size:10px;color:#64748b;padding:14px 12px 4px;font-weight:700;letter-spacing:.6px}
  .side .who{margin-top:16px;font-size:12px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:12px}
  .side .who b{color:#e2e8f0;display:block;font-size:13px}
  .side .who button{margin-top:8px;width:100%;background:#1e293b;color:#cbd5e1;border:none;padding:7px;border-radius:7px;font-size:12px}
  .main{padding:24px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .page-head h2{margin:0;font-size:20px}
  .page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:7px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fee2e2;color:var(--danger)}
  .btn.ok{background:#16a34a}
  .btn.kakao{background:#FEE500;color:#3C1E1E}
  .btn.wechat{background:#07C160;color:#fff}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat.clk{cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .stat.clk:hover{border-color:var(--brand);box-shadow:0 3px 10px rgba(15,118,110,.15)}
  .stat .k{color:var(--muted);font-size:13px;font-weight:600}
  .stat .v{font-size:23px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .panel .pb{padding:4px 2px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f8fafc}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .t-booked{background:#e0e7ff;color:#4338ca}.t-confirmed{background:#dbeafe;color:#1d4ed8}
  .t-checked_in{background:#fef9c3;color:#a16207}.t-in_progress{background:#ffedd5;color:#c2410c}
  .t-done{background:#dcfce7;color:#15803d}.t-no_show{background:#f1f5f9;color:#64748b}.t-cancelled{background:#fee2e2;color:#b91c1c}
  .t-paid{background:#dcfce7;color:#15803d}.t-partial{background:#fef9c3;color:#a16207}
  .t-unpaid{background:#fee2e2;color:#b91c1c}.t-refunded{background:#f1f5f9;color:#64748b}.t-quote{background:#e0e7ff;color:#4338ca}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .search{flex:1;min-width:160px}
  .srch{position:relative;display:inline-block}
  .srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;pointer-events:none}
  .srch input{padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:9px;background:#fff;min-width:180px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:16px;width:540px;max-width:100%;max-height:92vh;overflow:auto}
  .modal.lg{width:920px}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:800;font-size:17px;display:flex;justify-content:space-between}
  .modal .mh span{cursor:pointer;color:var(--muted)}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px}
  .field textarea{min-height:56px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
  .muted{color:var(--muted)}.right{text-align:right}
  .detail-sec{margin-bottom:16px}
  .detail-sec h4{margin:0 0 8px;font-size:13px;color:var(--brand)}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 10px;font-size:13.5px}
  .kv .k{color:var(--muted)}
  .note-box{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .cny{color:var(--muted);font-size:12px}
  .stat-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .stat-tabs button{padding:8px 15px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:600;color:var(--muted)}
  .stat-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  @media print{.side{display:none!important}.layout{grid-template-columns:1fr!important}.page-head button,.page-head input,.stat-tabs,.toolbar{display:none!important}.modal-bg{display:none!important}}
  /* quote */
  .quote-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:start}
  .pricelist{max-height:60vh;overflow:auto}
  .pl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .pl-row:hover{background:#f0fdfa}
  .pl-row .nm{font-weight:600}.pl-row .zh{color:var(--muted);font-size:12px}
  .cart-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
  .ldisc{font-size:12px;color:var(--muted);white-space:nowrap}.ldisc input{width:46px;padding:4px;border:1px solid var(--line);border-radius:6px;text-align:right;margin-right:2px}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;font-weight:700}
  .totrow{display:flex;justify-content:space-between;padding:6px 12px;font-size:14px}
  .totrow.big{font-size:20px;font-weight:800;padding:12px;border-top:2px solid var(--ink);margin-top:4px}
  .chip{display:inline-block;background:#f1f5f9;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  /* calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{text-align:center;font-size:12px;color:var(--muted);font-weight:700;padding:4px}
  .cal .cell{min-height:78px;border:1px solid var(--line);border-radius:9px;padding:6px;background:#fff;cursor:pointer;position:relative}
  .cal .cell:hover{border-color:var(--brand)}
  .cal .cell.other{background:#f8fafc;color:#cbd5e1}
  .cal .cell.today{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
  .cal .dnum{font-size:12px;font-weight:700}
  .cal .ev{font-size:11px;background:#e0f2f1;color:#0f766e;border-radius:5px;padding:1px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal .more{font-size:11px;color:var(--muted);margin-top:2px}
  .pb{overflow-x:auto}
  #menuBtn{display:none;position:fixed;top:10px;left:10px;z-index:70;background:#0f172a;color:#fff;border:none;width:42px;height:42px;border-radius:10px;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  @media(max-width:900px){
    #menuBtn{display:block}
    .layout{grid-template-columns:1fr}
    .side{position:fixed;left:-240px;top:0;bottom:0;height:100vh;width:216px;z-index:60;transition:left .25s ease;box-shadow:4px 0 16px rgba(0,0,0,.35)}
    .side.open{left:0}
    .main{padding:60px 16px 24px}
    .cards{grid-template-columns:repeat(2,1fr)!important}
    .quote-wrap{grid-template-columns:1fr!important}
    [style*="grid-template-columns:1fr 1fr"],[style*="grid-template-columns:1.1fr 1fr"]{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
    .grid2,.grid3{grid-template-columns:1fr}
    .page-head h2{font-size:18px}
    .modal.lg{width:100%}
  }
  @media(max-width:560px){
    .cards{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:1fr!important}
    .main{padding:58px 12px 20px}
    th,td{padding:9px 10px}
  }
</style>
</head>
<body>
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <h1>강남펄스 <span style="color:#0f766e">ERP</span></h1>
    <p>의료관광 상담·시술·정산 통합 시스템</p>
    <label>이메일</label><input id="email" type="email" value="admin@gangnam.clinic" autocomplete="username" />
    <label>비밀번호</label><input id="pw" type="password" value="gangnam1234" autocomplete="current-password" />
    <button id="loginBtn" type="submit">로그인</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">데모 계정 · <b>admin@gangnam.clinic</b> / <b>gangnam1234</b></div>
  </form>
</div>

<div id="app">
  <button id="menuBtn" onclick="toggleSide()">☰</button>
  <div id="backdrop" onclick="toggleSide(false)"></div>
  <div class="layout">
    <aside class="side">
      <div class="brand" style="cursor:pointer" onclick="location.reload()" title="새로고침">강남펄스<small id="hospName">ERP</small></div>
      <nav class="nav" id="nav">
        <a data-view="dashboard" class="active">대시보드</a>
        <div class="grp">진료 · 접수</div>
        <a data-view="calendar">예약 캘린더</a>
        <a data-view="reception">접수 현황</a>
        <a data-view="patients">환자 CRM</a>
        <a data-view="quote">상담 · 견적</a><a data-view="platq">플랫폼 문의</a>
        <a data-view="charts">진료차트</a>
        <a data-view="tasks">할일</a>
        <a data-view="files">자료실</a>
        <a data-view="billing">수납 · 영수증</a>
        <div class="grp">매출 · 정산</div>
        <a data-view="stats">통계</a>
        <a data-view="settlement">에이전시 정산</a>
        <a data-view="refsettle">소개자 정산</a>
        <div class="grp">거래처 · 상품</div>
        <a data-view="agencies">에이전시 관리</a>
        <a data-view="referrers">왕홍 · 소개자</a>
        <a data-view="packages">패키지 관리</a>

        <a data-view="settings" class="owner-only">병원 설정</a>
        <a data-view="audit" class="owner-only">관리자 로그</a>
        <a data-view="subscription" class="owner-only">구독·이용권</a>
        <div class="grp platform-only" style="display:none">플랫폼</div>
        <a data-view="platform" class="platform-only" style="display:none">플랫폼 관리</a>
      </nav>
      <div class="who"><b id="whoName">-</b><span id="whoRole" class="muted"></span>
        <button onclick="doLogout()">로그아웃</button><div id="appVer" style="margin-top:10px;font-size:11px;color:#475569;text-align:center"></div></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
const SB_URL="https://utbhlvybdutepnkvboko.supabase.co";
const SB_KEY="sb_publishable_LdLPNdjrD49iuOVLK8KVEA_SGgg9mkj";
const db=supabase.createClient(SB_URL,SB_KEY);
const APP_VERSION='v1.4.2 · 2026-07-08';
let curView='dashboard';
const KRW_PER_CNY=218; // 환율(대략) : CNY = KRW / 218

const STATUS_LABEL={booked:'예약',confirmed:'확정',checked_in:'접수완료',in_progress:'진료중',done:'완료',no_show:'노쇼',cancelled:'취소'};
const PAY_LABEL={unpaid:'미수납',partial:'부분납',paid:'완납',refunded:'환불'};
const ORD_LABEL={quote:'견적',confirmed:'확정',done:'완료',cancelled:'취소'};
const state={hospital_id:null,hospital_name:'강남펄스',staff:null,procedures:[],patients:[],agencies:[],discounts:[],packages:[],referrers:[]};
const PLAN_LABEL={basic:'기본',advanced:'고급',premium:'프리미엄'};
const PLAN_PRICE={basic:50000,advanced:100000,premium:150000};
const TIER_MENUS={
  basic:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings'],
  advanced:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings','stats','agencies','referrers','packages','settlement','refsettle'],
  premium:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings','stats','agencies','referrers','packages','settlement','refsettle','audit']
};

const won=n=>'₩'+Number(n||0).toLocaleString('ko-KR');
const cny=n=>'¥'+Math.round(Number(n||0)/KRW_PER_CNY).toLocaleString('ko-KR');
const methodBadge=m=>m?`<span class="tag" style="background:#eef2ff;color:#4338ca;margin-left:4px">${esc(m)}</span>`:'';
const fdate=s=>s?new Date(s).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'-';
const ftime=s=>s?new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
const fdt=s=>s?`${fdate(s)} ${ftime(s)}`:'-';
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const MAG='<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>';
function keepFocus(id){setTimeout(function(){const i=el(id);if(i){const v=i.value;i.focus();try{i.setSelectionRange(v.length,v.length);}catch(e){}}},0);}
const pmap=()=>Object.fromEntries(state.patients.map(p=>[p.id,p.name]));
const amap=()=>Object.fromEntries(state.agencies.map(a=>[a.id,a.name]));
let billSearch='',billSort='recent',billFrom='',billTo='';let setlSearch='',setlSort='rev';let rsSearch='',rsSort='rev';let agmSearch='',agmSort='name';let refmSearch='',refmSort='name';let chSearch='',chSort='date';let setlVat=true,rsVat=true;

async function doLogin(e){e.preventDefault();const b=el('loginBtn');el('loginErr').textContent='';var _now=Date.now();var _lk=parseInt(localStorage.getItem('login_lock_until')||'0',10);if(_lk>_now){el('loginErr').textContent='로그인 시도가 많아 잠겼습니다. '+Math.ceil((_lk-_now)/1000)+'초 후 다시 시도하세요.';return;}b.disabled=true;
  const {error}=await db.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});
  if(error){var _fc=parseInt(localStorage.getItem('login_fail_cnt')||'0',10)+1;if(_fc>=5){localStorage.setItem('login_lock_until',String(Date.now()+60000));localStorage.setItem('login_fail_cnt','0');el('loginErr').textContent='로그인 5회 실패 — 1분간 로그인이 제한됩니다.';}else{localStorage.setItem('login_fail_cnt',String(_fc));el('loginErr').textContent='로그인 실패: '+(error.message||error)+' ('+_fc+'/5)';}b.disabled=false;return;}localStorage.removeItem('login_fail_cnt');localStorage.removeItem('login_lock_until');await boot();}
async function doLogout(){await db.auth.signOut();location.reload();}

function getDeviceId(){var did=localStorage.getItem('gp_device_id');if(!did){did=((window.crypto&&crypto.randomUUID)?crypto.randomUUID():('d'+Date.now()+Math.random().toString(36).slice(2)));localStorage.setItem('gp_device_id',did);}return did;}
function deviceLimitFor(tier){return (tier==='premium')?999999:((tier==='advanced')?3:1);}
function deviceDefaultLabel(){var ua=navigator.userAgent||'';var mob=/Mobi|Android|iPhone|iPad|iPod/i.test(ua);var os=/Android/i.test(ua)?'Android':(/iPhone|iPad|iPod/i.test(ua)?'iOS':(/Windows/i.test(ua)?'Windows':(/Mac/i.test(ua)?'Mac':'')));return (mob?'모바일':'PC')+(os?(' · '+os):'');}
// 로그인 시: 등록된 기기면 통과(방문시간 갱신), 미등록이어도 한도 미만이면 통과(등록은 기기관리에서 수동). 한도 초과 + 미등록이면 차단.
async function enforceDeviceLimit(){
try{
if(state.isPlatformAdmin) return true;
var limit=deviceLimitFor(state.plan_tier||'basic');
var did=getDeviceId();var sid=state.staff.id;

let calYM=null;
async function renderCalendar(){
  const now=new Date();if(!calYM)calYM={y:now.getFullYear(),m:now.getMonth()};
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const {y,m:mo}=calYM;
  const start=new Date(y,mo,1),end=new Date(y,mo+1,1);
  const {data}=await db.from('appointments').select('*').gte('appointment_at',start.toISOString()).lt('appointment_at',end.toISOString()).order('appointment_at');
  const PM=pmap();const byDay={};(data||[]).forEach(a=>{const d=new Date(a.appointment_at).getDate();(byDay[d]=byDay[d]||[]).push(a);});
  const firstDow=start.getDay(),days=new Date(y,mo+1,0).getDate();
  const todayD=(now.getFullYear()===y&&now.getMonth()===mo)?now.getDate():-1;
  let cells='';for(let i=0;i<firstDow;i++)cells+='<div class="cell other"></div>';
  for(let d=1;d<=days;d++){const evs=byDay[d]||[];
    cells+=`<div class="cell${d===todayD?' today':''}" onclick="dayModal(${y},${mo},${d})"><div class="dnum">${d}</div>${
      evs.slice(0,3).map(a=>`<div class="ev">${ftime(a.appointment_at)} ${esc(PM[a.patient_id]||'')}</div>`).join('')}${
      evs.length>3?`<div class="more">+${evs.length-3}</div>`:''}</div>`;}

   <div class="page-head"><div><h2>예약 캘린더</h2><div class="sub">날짜를 클릭하면 예약을 보고 추가할 수 있어요</div></div>
     <div><button class="btn ghost sm" onclick="calMove(-1)">◀</button>

function lineNet(c){return Math.round(c.unit_price*c.qty*(1-(c.dpct||0)/100));}
function setDisc(i,v){cart[i].dpct=Math.max(0,Math.min(100,Number(v)||0));var e=el('lnet_'+i);if(e)e.textContent=won(lineNet(cart[i]));calcQuote();}

  el('q_cart').innerHTML=cart.length?cart.map((c,i)=>`<div class="cart-item">
     <div><b>${esc(c.name)}</b><div class="cny">${won(c.unit_price)}</div></div>
     <div class="qty"><button onclick="chQty(${i},-1)">−</button><b>${c.qty}</b><button onclick="chQty(${i},1)">+</button></div>
     <div class="ldisc"><input type="number" min="0" max="100" value="${c.dpct||0}" oninput="setDisc(${i},this.value)" title="이 시술 할인%">%</div>

}
function calcQuote(){
  const sub=cart.reduce((s,c)=>s+lineNet(c),0);
  const kind=el('q_dkind').value;let val=Number(el('q_dval').value||0);let disc=0;
  if(kind==='percent')disc=Math.round(sub*Math.min(val,100)/100);else if(kind==='fixed')disc=Math.min(val,sub);
  const total=sub-disc;
  el('q_tot').innerHTML=`<div class="totrow"><span class="muted">소계</span><span>${won(sub)}</span></div>
    ${disc>0?`<div class="totrow" style="color:var(--danger)"><span>할인</span><span>-${won(disc)}</span></div>`:''}
    <div class="totrow big"><span>합계</span><span>${won(total)} <span class="cny" style="font-size:13px">${cny(total)}</span></span></div>`;
  quoteCtx.subtotal=sub;quoteCtx.discount_amount=disc;quoteCtx.total=total;quoteCtx.discount_kind=kind;quoteCtx.discount_value=val;
}

/* ---- 카카오톡 전송 ---- */
function kakaoKey(){return localStorage.getItem('kakao_js_key')||'';}
function ensureKakao(){
  const k=kakaoKey();
  if(k&&window.Kakao&&!Kakao.isInitialized()){try{Kakao.init(k);}catch(e){}}
  return !!(window.Kakao&&Kakao.isInitialized&&Kakao.isInitialized());
}
function quoteText(){
  const p=state.patients.find(x=>x.id===el('q_pat').value);
  const ag=state.agencies.find(x=>x.id===el('q_ag').value);
  const doc=el('q_doc').value||'';
  const sub=quoteCtx.subtotal,disc=quoteCtx.discount_amount,total=quoteCtx.total;
  const now=new Date();
  let t=`[${state.hospital_name}] 견적서\n`;
  t+=`발행일: ${now.toLocaleDateString('ko-KR')}\n`;
  t+=`환자: ${p?p.name:'-'}${doc?' / 담당의: '+doc:''}\n`;
  if(ag)t+=`에이전시: ${ag.name}\n`;
  t+=`──────────────\n`;
  cart.forEach(c=>{const net=lineNet(c);const dpct=c.dpct||0;t+=`• ${c.name} ×${c.qty}${dpct?' ('+dpct+'%↓)':''} : ${won(net)}\n`;});
  t+=`──────────────\n`;
  t+=`소계: ${won(sub)}\n`;
  if(disc>0)t+=`할인: -${won(disc)}\n`;
  t+=`합계: ${won(total)} (${cny(total)})\n\n`;
  t+=`※ 본 견적은 상담 기준 금액이며, 실제 시술 내용에 따라 변동될 수 있습니다.`;
  return t;
}
/* ---- 위챗 전송용 중문 견적 ---- */
function quoteTextZh(){
  const p=state.patients.find(x=>x.id===el('q_pat').value);
  const ag=state.agencies.find(x=>x.id===el('q_ag').value);
  const doc=el('q_doc').value||'';
  const sub=quoteCtx.subtotal,disc=quoteCtx.discount_amount,total=quoteCtx.total;
  const now=new Date();
  const zhName=c=>{const pr=state.procedures.find(x=>x.id===c.procedure_id);return (pr&&pr.name_zh)?pr.name_zh:(c.name||'').replace('[패키지]','[套餐]');};
  let t=`【${state.hospital_name}】报价单\n`;
  t+=`日期: ${now.toLocaleDateString('zh-CN')}\n`;
  t+=`客户: ${p?p.name:'-'}${doc?' / 主诊医生: '+doc:''}\n`;
  if(ag)t+=`代理: ${ag.name}\n`;
  t+=`──────────────\n`;
  cart.forEach(c=>{const net=lineNet(c);const dpct=c.dpct||0;t+=`• ${zhName(c)} ×${c.qty}${dpct?' ('+dpct+'%↓)':''} : ${won(net)}\n`;});
  t+=`──────────────\n`;
  t+=`小计: ${won(sub)}\n`;
  if(disc>0)t+=`优惠: -${won(disc)}\n`;
  t+=`合计: ${won(total)}（${cny(total)}）\n\n`;
  t+=`※ 本报价为咨询参考金额，最终费用将根据实际手术方案确定。`;
  return t;
}
async function useQuota(kind,labelName){
  try{
    const {data,error}=await db.rpc('use_quota',{p_kind:kind});
    if(error) return true; // 카운터 오류 시 사용 막지 않음
    if(data&&data.allowed===false){ alert('이번 달 '+labelName+' 한도('+data.limit+'건)를 모두 사용했습니다.\n매월 1일 자동 리셋되며, 상위 요금제로 업그레이드하면 한도가 늘어납니다.'); return false; }
    return true;
  }catch(e){ return true; }
}
async function sendWechat(){
  if(!cart.length){alert('시술을 담아주세요');return;}
  if(!el('q_pat').value){alert('환자를 선택하세요');return;}
  calcQuote();
  if(!await useQuota('msg','견적 발송')) return;
  const text=quoteTextZh();
  let copied=false;
  try{await navigator.clipboard.writeText(text);copied=true;}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{copied=document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }
  logAudit('위챗 견적 전송(복사)',`${won(quoteCtx.total)}`);
  alert(copied?'견적 내용이 복사되었습니다.\n위챗(WeChat) 대화창에 붙여넣기(Ctrl+V) 하세요.':'복사에 실패했습니다. 견적서 출력을 이용하세요.');
}
async function sendKakao(){
  if(!cart.length){alert('시술을 담아주세요');return;}
  if(!el('q_pat').value){alert('환자를 선택하세요');return;}
  calcQuote();
  if(!await useQuota('msg','견적 발송')) return;
  const text=quoteText();
  // 0) 알림톡 자동발송(병원설정에서 사용 ON + 환자 전화번호가 있을 때)
  if(localStorage.getItem('alimtalk_on')==='1'){
    const p0=state.patients.find(x=>x.id===el('q_pat').value);
    const phone=((p0&&p0.contact&&p0.contact.phone)||'').replace(/[^0-9]/g,'');
    if(!phone){
      alert('환자 연락처(전화번호)가 없어 알림톡을 보낼 수 없습니다.\n환자 CRM에서 연락처를 등록하거나, 아래 복사 방식으로 전송하세요.');
    }else{
      try{
        const vars={'#{병원명}':state.hospital_name||'병원','#{환자명}':p0.name||'-','#{합계}':Number(quoteCtx.total||0).toLocaleString('ko-KR'),'#{전화}':'병원 문의'};
        const {data,error}=await db.functions.invoke('send-alimtalk',{body:{to:phone,templateId:localStorage.getItem('alimtalk_template')||'',variables:vars}});
        if(error)throw error;
        if(data&&data.ok){logAudit('알림톡 견적 전송',p0.name+' '+won(quoteCtx.total));alert('알림톡으로 견적이 전송되었습니다.\n('+p0.name+' · '+phone+')');return;}
        alert('알림톡 발송 실패: '+((data&&data.error)||'설정을 확인하세요')+'\n\n견적 내용을 클립보드로 복사합니다.');
      }catch(e){
        alert('알림톡 발송 오류: '+((e&&e.message)||e)+'\n\n견적 내용을 클립보드로 복사합니다.');
      }
    }
  }
  // 1) 카카오 JS 키가 설정된 경우: 카카오톡 공유(수신자 선택 후 전송)
  if(ensureKakao()){
    try{
      Kakao.Share.sendDefault({
        objectType:'text',
        text:text,
        link:{mobileWebUrl:location.href,webUrl:location.href}
      });
      logAudit('카카오톡 견적 전송',`#${el('q_pat').value.slice(0,8)} ${won(quoteCtx.total)}`);
      return;
    }catch(e){/* 실패 시 아래 복사 방식으로 폴백 */}
  }
  // 2) 폴백: 견적 내용을 클립보드에 복사 → 카카오톡 대화창에 붙여넣기
  let copied=false;
  try{await navigator.clipboard.writeText(text);copied=true;}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{copied=document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }
  logAudit('카카오톡 견적 전송(복사)',`${won(quoteCtx.total)}`);
  alert(copied
    ? '견적 내용이 클립보드에 복사되었습니다.\n카카오톡 대화창에 붙여넣기(Ctrl+V) 후 전송하세요.'
    : '견적 내용:\n\n'+text);
}

function statPreset(kind){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth(), d=now.getDate();
  const fmt=x=>{const yy=x.getFullYear(),mm=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return yy+'-'+mm+'-'+dd;};
  const today=new Date(y,mo,d);
  if(kind==='day'){ statFrom=fmt(today); statTo=fmt(today); }
  else if(kind==='week'){ const dow=(today.getDay()+6)%7; statFrom=fmt(new Date(y,mo,d-dow)); statTo=fmt(new Date(y,mo,d-dow+6)); }
  else if(kind==='month'){ statFrom=fmt(new Date(y,mo,1)); statTo=fmt(new Date(y,mo+1,0)); }
  else if(kind==='year'){ statFrom=fmt(new Date(y,0,1)); statTo=fmt(new Date(y,11,31)); }
  renderStats();
}

async function logAudit(action,detail){try{await db.from('audit_logs').insert({hospital_id:state.hospital_id,staff_id:state.staff?state.staff.id:null,staff_name:state.staff?state.staff.name:null,menu:curView,action:action,detail:detail?String(detail):null,ip:state.ip,country:state.country||null||null});}catch(e){}}
function menuLabel(k){const x=(typeof MENUS!=='undefined')?MENUS.find(y=>y.k===k):null;return x?x.label:(k||'-');}
let alFrom='',alTo='';
async function renderAudit(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const useR=!!(alFrom&&alTo);
  let q=db.from('audit_logs').select('*').order('created_at',{ascending:false});
  q=useR?q.gte('created_at',alFrom).lte('created_at',alTo+'T23:59:59').limit(5000):q.limit(500);

  m.innerHTML=`<div class="page-head"><div><h2>관리자 로그</h2><div class="sub">직원 활동 감사 로그 · 누가·메뉴·IP·시각·행위 · ${useR?(alFrom+' ~ '+alTo):'최근 500건'} · 총 ${(data||[]).length}건</div></div>
     <button class="btn ghost" onclick="exportAuditCSV()">CSV 내보내기</button></div>

   <div class="panel"><div class="pb" id="alTable"></div></div>`;

}
function flagEmoji(cc){if(!cc||cc.length!==2)return '';var c=cc.toLowerCase();return '<img src="https://flagcdn.com/20x15/'+c+'.png" width="20" height="15" style="vertical-align:-3px;margin-right:5px;border-radius:2px" alt="'+cc.toUpperCase()+'" onerror="this.replaceWith(document.createTextNode(this.alt+String.fromCharCode(160)))">';}
function drawAudit(list){const t=el('alTable');t.innerHTML=list.length?`<table><thead><tr><th>시각</th><th>직원</th><th>메뉴</th><th>행위</th><th>상세</th><th>IP</th></tr></thead><tbody>${list.map(l=>`<tr><td style="white-space:nowrap">${new Date(l.created_at).toLocaleString('ko-KR')}</td><td><b>${esc(l.staff_name||'-')}</b></td><td>${esc(menuLabel(l.menu))}</td><td>${esc(l.action)}</td><td class="muted">${esc(l.detail||'')}</td><td class="muted">${flagEmoji(l.country)+esc(l.ip||'-')}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">로그가 없습니다.</div>';}
function filterAudit(){const q=(el('alSrch').value||'').toLowerCase();drawAudit((state._audit||[]).filter(l=>!q||(l.staff_name||'').toLowerCase().includes(q)||(l.action||'').toLowerCase().includes(q)||menuLabel(l.menu).toLowerCase().includes(q)||(l.detail||'').toLowerCase().includes(q)));}
function exportAuditCSV(){const rows=(state._audit||[]).map(l=>[new Date(l.created_at).toLocaleString('ko-KR'),l.staff_name||'',menuLabel(l.menu),l.action,l.detail||'',l.ip||'']);const head=['시각','직원','메뉴','행위','상세','IP'];const q=c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`;const csv='﻿'+[head.map(q).join(',')].concat(rows.map(r=>r.map(q).join(','))).join('\n');const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='감사로그.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}
