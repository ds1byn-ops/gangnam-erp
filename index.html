<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강남클리닉 ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --brand:#0f766e; --brand-2:#14b8a6; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --card:#fff; --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Malgun Gothic',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f766e,#0d9488 60%,#0891b2)}
  .login-card{background:#fff;width:360px;padding:36px 32px;border-radius:16px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 24px;color:var(--muted);font-size:13px}
  .login-card label{display:block;font-weight:600;margin:14px 0 6px;font-size:13px}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
  .login-card button{width:100%;margin-top:22px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:15px}
  .hint{margin-top:16px;font-size:12px;color:var(--muted);background:#f8fafc;padding:10px;border-radius:8px;border:1px solid var(--line);line-height:1.6}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px}
  #app{display:none;min-height:100vh}
  .layout{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .side{background:#0f172a;color:#cbd5e1;padding:20px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{font-size:18px;font-weight:800;color:#fff;padding:4px 10px 16px;letter-spacing:-.5px}
  .brand small{display:block;font-size:11px;color:#5eead4;font-weight:600;margin-top:3px}
  .nav a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;color:#cbd5e1;text-decoration:none;font-weight:600;margin-bottom:2px;font-size:13.5px}
  .nav a:hover{background:#1e293b;color:#fff}
  .nav a.active{background:var(--brand);color:#fff}
  .nav .ico{width:16px;text-align:center}
  .side .who{margin-top:16px;font-size:12px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:12px}
  .side .who b{color:#e2e8f0;display:block;font-size:13px}
  .side .who button{margin-top:8px;width:100%;background:#1e293b;color:#cbd5e1;border:none;padding:7px;border-radius:7px;font-size:12px}
  .main{padding:24px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .page-head h2{margin:0;font-size:20px}
  .page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:7px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fee2e2;color:var(--danger)}
  .btn.ok{background:#16a34a}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat .k{color:var(--muted);font-size:13px;font-weight:600}
  .stat .v{font-size:23px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .panel .pb{padding:4px 2px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f8fafc}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .t-booked{background:#e0e7ff;color:#4338ca}.t-confirmed{background:#dbeafe;color:#1d4ed8}
  .t-checked_in{background:#fef9c3;color:#a16207}.t-in_progress{background:#ffedd5;color:#c2410c}
  .t-done{background:#dcfce7;color:#15803d}.t-no_show{background:#f1f5f9;color:#64748b}.t-cancelled{background:#fee2e2;color:#b91c1c}
  .t-paid{background:#dcfce7;color:#15803d}.t-partial{background:#fef9c3;color:#a16207}
  .t-unpaid{background:#fee2e2;color:#b91c1c}.t-refunded{background:#f1f5f9;color:#64748b}.t-quote{background:#e0e7ff;color:#4338ca}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .search{flex:1;min-width:160px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:16px;width:540px;max-width:100%;max-height:92vh;overflow:auto}
  .modal.lg{width:920px}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:800;font-size:17px;display:flex;justify-content:space-between}
  .modal .mh span{cursor:pointer;color:var(--muted)}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px}
  .field textarea{min-height:56px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
  .muted{color:var(--muted)}.right{text-align:right}
  .detail-sec{margin-bottom:16px}
  .detail-sec h4{margin:0 0 8px;font-size:13px;color:var(--brand)}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 10px;font-size:13.5px}
  .kv .k{color:var(--muted)}
  .note-box{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .cny{color:var(--muted);font-size:12px}
  /* quote */
  .quote-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:start}
  .pricelist{max-height:60vh;overflow:auto}
  .pl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .pl-row:hover{background:#f0fdfa}
  .pl-row .nm{font-weight:600}.pl-row .zh{color:var(--muted);font-size:12px}
  .cart-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
  .ldisc{font-size:12px;color:var(--muted);white-space:nowrap}.ldisc input{width:46px;padding:4px;border:1px solid var(--line);border-radius:6px;text-align:right;margin-right:2px}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;font-weight:700}
  .totrow{display:flex;justify-content:space-between;padding:6px 12px;font-size:14px}
  .totrow.big{font-size:20px;font-weight:800;padding:12px;border-top:2px solid var(--ink);margin-top:4px}
  .chip{display:inline-block;background:#f1f5f9;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  /* calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{text-align:center;font-size:12px;color:var(--muted);font-weight:700;padding:4px}
  .cal .cell{min-height:78px;border:1px solid var(--line);border-radius:9px;padding:6px;background:#fff;cursor:pointer;position:relative}
  .cal .cell:hover{border-color:var(--brand)}
  .cal .cell.other{background:#f8fafc;color:#cbd5e1}
  .cal .cell.today{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
  .cal .dnum{font-size:12px;font-weight:700}
  .cal .ev{font-size:11px;background:#e0f2f1;color:#0f766e;border-radius:5px;padding:1px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal .more{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <h1>강남클리닉 <span style="color:#0f766e">ERP</span></h1>
    <p>의료관광 상담·시술·정산 통합 시스템</p>
    <label>이메일</label><input id="email" type="email" value="admin@gangnam.clinic" autocomplete="username" />
    <label>비밀번호</label><input id="pw" type="password" value="gangnam1234" autocomplete="current-password" />
    <button id="loginBtn" type="submit">로그인</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">데모 계정 · <b>admin@gangnam.clinic</b> / <b>gangnam1234</b></div>
  </form>
</div>

<div id="app">
  <div class="layout">
    <aside class="side">
      <div class="brand" style="cursor:pointer" onclick="location.reload()" title="새로고침">강남클리닉<small id="hospName">ERP</small></div>
      <nav class="nav" id="nav">
        <a data-view="dashboard" class="active"><span class="ico">▤</span> 대시보드</a>
        <a data-view="calendar"><span class="ico">📅</span> 예약 캘린더</a>
        <a data-view="reception"><span class="ico">◷</span> 접수 현황</a>
        <a data-view="patients"><span class="ico">☺</span> 환자관리</a>
        <a data-view="quote"><span class="ico">🧾</span> 상담·견적</a>
        <a data-view="charts"><span class="ico">✎</span> 진료차트</a>
        <a data-view="billing"><span class="ico">₩</span> 수납·매출</a>
        <a data-view="settlement"><span class="ico">🤝</span> 에이전시 정산</a>
        <a data-view="agencies"><span class="ico">🏢</span> 에이전시 관리</a>
        <a data-view="packages"><span class="ico">📦</span> 패키지 관리</a>
        <a data-view="referrers"><span class="ico">🌟</span> 왕홍·소개자</a>
        <a data-view="refsettle"><span class="ico">💸</span> 소개자 정산</a>
      </nav>
      <div class="who"><b id="whoName">-</b><span id="whoRole" class="muted"></span>
        <button onclick="doLogout()">로그아웃</button></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
const SB_URL="https://fhuninzvrkzodhvwkxvo.supabase.co";
const SB_KEY="sb_publishable_DqrHtdkvc-0VnN511-QdnQ_RuC-fbJ4";
const db=supabase.createClient(SB_URL,SB_KEY);
const KRW_PER_CNY=218; // 환율(대략) : CNY = KRW / 218

const STATUS_LABEL={booked:'예약',confirmed:'확정',checked_in:'접수완료',in_progress:'진료중',done:'완료',no_show:'노쇼',cancelled:'취소'};
const PAY_LABEL={unpaid:'미수납',partial:'부분납',paid:'완납',refunded:'환불'};
const ORD_LABEL={quote:'견적',confirmed:'확정',done:'완료',cancelled:'취소'};
const state={hospital_id:null,hospital_name:'강남클리닉',staff:null,procedures:[],patients:[],agencies:[],discounts:[],packages:[],referrers:[]};

const won=n=>'₩'+Number(n||0).toLocaleString('ko-KR');
const cny=n=>'¥'+Math.round(Number(n||0)/KRW_PER_CNY).toLocaleString('ko-KR');
const fdate=s=>s?new Date(s).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'-';
const ftime=s=>s?new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
const fdt=s=>s?`${fdate(s)} ${ftime(s)}`:'-';
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const pmap=()=>Object.fromEntries(state.patients.map(p=>[p.id,p.name]));
const amap=()=>Object.fromEntries(state.agencies.map(a=>[a.id,a.name]));

async function doLogin(e){e.preventDefault();const b=el('loginBtn');b.disabled=true;el('loginErr').textContent='';
  const {error}=await db.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});
  if(error){el('loginErr').textContent='로그인 실패: '+(error.message||error);b.disabled=false;return;}await boot();}
async function doLogout(){await db.auth.signOut();location.reload();}

async function boot(){
  const {data:{user}}=await db.auth.getUser();
  if(!user){el('login').style.display='flex';el('app').style.display='none';return;}
  const {data:staff}=await db.from('staff_accounts').select('id,name,role,hospital_id').eq('id',user.id).single();
  if(!staff){el('loginErr').textContent='스태프 계정이 없습니다.';return;}
  state.staff=staff;state.hospital_id=staff.hospital_id;
  const [{data:hosp},{data:procs},{data:ags},{data:dcs},{data:pkgs},{data:pkgItems}]=await Promise.all([
    db.from('hospitals').select('name').eq('id',staff.hospital_id).single(),
    db.from('procedures').select('*').eq('is_active',true).order('category').order('name'),
    db.from('agencies').select('*').order('name'),
    db.from('discount_codes').select('*').eq('is_active',true),
    db.from('packages').select('*').eq('is_active',true).order('ptype').order('name'),
    db.from('package_items').select('*').order('sort'),
  ]);
  if(hosp)state.hospital_name=hosp.name;
  state.procedures=procs||[];state.agencies=ags||[];state.discounts=dcs||[];
  state.packages=(pkgs||[]).map(p=>({...p,items:(pkgItems||[]).filter(i=>i.package_id===p.id)}));
  const {data:refs}=await db.from('referrers').select('*').eq('is_active',true).order('name');state.referrers=refs||[];
  el('hospName').textContent=state.hospital_name;
  el('whoName').textContent=staff.name;
  el('whoRole').textContent=({owner:'원장',manager:'매니저',desk:'데스크',viewer:'열람'})[staff.role]||staff.role;
  el('login').style.display='none';el('app').style.display='block';
  await loadPatients();navTo('dashboard');
}
async function loadPatients(){const {data}=await db.from('patients').select('*').order('name');state.patients=data||[];}

el('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a)navTo(a.dataset.view);});
function navTo(v){document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.view===v));
  ({dashboard:renderDashboard,calendar:renderCalendar,reception:renderReception,patients:renderPatients,quote:renderQuote,charts:renderCharts,billing:renderBilling,settlement:renderSettlement,agencies:renderAgencies,packages:renderPackages,referrers:renderReferrers,refsettle:renderRefSettle}[v])();}
function openModal(html,lg){el('modal').className='modal'+(lg?' lg':'');el('modal').innerHTML=html;el('modalBg').style.display='flex';}
function closeModal(){el('modalBg').style.display='none';}
el('modalBg').addEventListener('click',e=>{if(e.target===el('modalBg'))closeModal();});

/* ============ DASHBOARD ============ */
async function renderDashboard(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const ds=new Date(y,mo,now.getDate()).toISOString(),de=new Date(y,mo,now.getDate()+1).toISOString();
  const ms=new Date(y,mo,1).toISOString(),me=new Date(y,mo+1,1).toISOString();
  const [appt,monOrders,pat,recent]=await Promise.all([
    db.from('appointments').select('*').gte('appointment_at',ds).lt('appointment_at',de).order('appointment_at'),
    db.from('orders').select('total,pay_status,order_date,status').gte('order_date',ms).lt('order_date',me).neq('status','cancelled'),
    db.from('patients').select('id',{count:'exact',head:true}),
    db.from('orders').select('*').order('order_date',{ascending:false}).limit(6),
  ]);
  const appts=appt.data||[],mons=monOrders.data||[];
  const monSales=mons.reduce((s,o)=>s+Number(o.total||0),0);
  const unpaid=mons.filter(o=>o.pay_status!=='paid').reduce((s,o)=>s+Number(o.total||0),0);
  const PM=pmap(),AM=amap();
  m.innerHTML=`
   <div class="page-head"><div><h2>대시보드</h2>
     <div class="sub">${esc(state.hospital_name)} · ${now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div></div></div>
   <div class="cards">
     <div class="stat"><div class="k">오늘 예약</div><div class="v">${appts.length}<small> 건</small></div></div>
     <div class="stat"><div class="k">이번달 매출</div><div class="v">${won(monSales)}</div><div class="cny">${cny(monSales)}</div></div>
     <div class="stat"><div class="k">미수금</div><div class="v" style="color:var(--danger)">${won(unpaid)}</div></div>
     <div class="stat"><div class="k">전체 환자</div><div class="v">${pat.count||0}<small> 명</small></div></div>
   </div>
   <div class="panel"><div class="ph">오늘 예약 <button class="btn sm" onclick="navTo('reception')">접수 →</button></div>
     <div class="pb">${appts.length?`<table><thead><tr><th>시간</th><th>환자</th><th>담당</th><th>상태</th></tr></thead><tbody>${
       appts.map(a=>`<tr><td>${ftime(a.appointment_at)}</td><td>${esc(PM[a.patient_id]||'환자')}</td><td>${esc(a.doctor||'-')}</td><td><span class="tag t-${a.status}">${STATUS_LABEL[a.status]}</span></td></tr>`).join('')
     }</tbody></table>`:'<div class="empty">오늘 예약이 없습니다.</div>'}</div></div>
   <div class="panel"><div class="ph">최근 상담·견적 <button class="btn sm" onclick="navTo('billing')">수납 →</button></div>
     <div class="pb">${(recent.data||[]).length?`<table><thead><tr><th>No</th><th>환자</th><th>에이전시</th><th class="right">금액</th><th>수납</th></tr></thead><tbody>${
       recent.data.map(o=>`<tr><td>#${o.order_no}</td><td>${esc(PM[o.patient_id]||'-')}</td><td>${esc(AM[o.agency_id]||'-')}</td><td class="right">${won(o.total)}</td><td><span class="tag t-${o.pay_status}">${PAY_LABEL[o.pay_status]}</span></td></tr>`).join('')
     }</tbody></table>`:'<div class="empty">견적이 없습니다.</div>'}</div></div>`;
}

/* ============ CALENDAR ============ */
let calYM=null;
async function renderCalendar(){
  const now=new Date();if(!calYM)calYM={y:now.getFullYear(),m:now.getMonth()};
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const {y,m:mo}=calYM;
  const start=new Date(y,mo,1),end=new Date(y,mo+1,1);
  const {data}=await db.from('appointments').select('*').gte('appointment_at',start.toISOString()).lt('appointment_at',end.toISOString()).order('appointment_at');
  const PM=pmap();const byDay={};(data||[]).forEach(a=>{const d=new Date(a.appointment_at).getDate();(byDay[d]=byDay[d]||[]).push(a);});
  const firstDow=start.getDay(),days=new Date(y,mo+1,0).getDate();
  const todayD=(now.getFullYear()===y&&now.getMonth()===mo)?now.getDate():-1;
  let cells='';for(let i=0;i<firstDow;i++)cells+='<div class="cell other"></div>';
  for(let d=1;d<=days;d++){const evs=byDay[d]||[];
    cells+=`<div class="cell${d===todayD?' today':''}" onclick="dayModal(${y},${mo},${d})"><div class="dnum">${d}</div>${

function drawPrice(){
  const q=(el('q_search').value||'').trim().toLowerCase();

    let pk=state.packages.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.ptype||'').toLowerCase().includes(q));

       <div class="right"><div><b>${won(p.total_price)}</b></div><div class="cny">${cny(p.total_price)}</div></div>
     </div>`).join('')||'<div class="empty">패키지 없음</div>';

  }
  let list=state.procedures.filter(p=>(!curCat||p.category===curCat)&&(!q||p.name.toLowerCase().includes(q)||(p.name_zh||'').toLowerCase().includes(q)));

     <div class="right"><div>${won(p.price)}</div><div class="cny">${p.price_cny?('¥'+Number(p.price_cny).toLocaleString()):cny(p.price)}</div></div>

}
function addItem(pid){const p=state.procedures.find(x=>x.id===pid);if(!p)return;
  const ex=cart.find(c=>c.procedure_id===pid);if(ex)ex.qty++;else cart.push({procedure_id:pid,name:p.name,unit_price:Number(p.price),qty:1});
  drawCart();}
function addPkg(id){const p=state.packages.find(x=>x.id===id);if(!p)return;
  const key='pkg:'+id;const ex=cart.find(c=>c.pkey===key);if(ex)ex.qty++;
  else cart.push({procedure_id:null,pkey:key,name:'[패키지] '+p.name,unit_price:Number(p.total_price),qty:1});

function pkgView(id){const p=state.packages.find(x=>x.id===id);if(!p)return;

      p.items.map(i=>`<tr><td>${esc(i.name)}${i.qty>1?' ×'+i.qty:''}</td><td class="right">${won(i.price*i.qty)}</td></tr>`).join('')}</tbody></table></div>

function lineNet(c){return Math.round(c.unit_price*c.qty*(1-(c.dpct||0)/100));}
function setDisc(i,v){cart[i].dpct=Math.max(0,Math.min(100,Number(v)||0));var e=el('lnet_'+i);if(e)e.textContent=won(lineNet(cart[i]));calcQuote();}

     <div class="qty"><button onclick="chQty(${i},-1)">−</button><b>${c.qty}</b><button onclick="chQty(${i},1)">+</button></div>
     <div class="ldisc"><input type="number" min="0" max="100" value="${c.dpct||0}" oninput="setDisc(${i},this.value)" title="이 시술 할인%">%</div>
     <div class="right"><b id="lnet_${i}">${won(lineNet(c))}</b></div>
     <button class="btn sm danger" onclick="chQty(${i},-99)">×</button></div>`).join(''):'<div class="empty" style="padding:20px">시술을 담아주세요</div>';
  calcQuote();
}
function calcQuote(){
  const sub=cart.reduce((s,c)=>s+lineNet(c),0);
  const kind=el('q_dkind').value;let val=Number(el('q_dval').value||0);let disc=0;
  if(kind==='percent')disc=Math.round(sub*Math.min(val,100)/100);else if(kind==='fixed')disc=Math.min(val,sub);
  const total=sub-disc;
  el('q_tot').innerHTML=`<div class="totrow"><span class="muted">소계</span><span>${won(sub)}</span></div>
    ${disc>0?`<div class="totrow" style="color:var(--danger)"><span>할인</span><span>-${won(disc)}</span></div>`:''}
    <div class="totrow big"><span>합계</span><span>${won(total)} <span class="cny" style="font-size:13px">${cny(total)}</span></span></div>`;
  quoteCtx.subtotal=sub;quoteCtx.discount_amount=disc;quoteCtx.total=total;quoteCtx.discount_kind=kind;quoteCtx.discount_value=val;
}
function onQuotePatient(){const p=state.patients.find(x=>x.id===el('q_pat').value);if(p&&p.source_agency_id)el('q_ag').value=p.source_agency_id;}
function applyCode(){const code=(el('q_dcode').value||'').trim();if(!code){return;}
  const dc=state.discounts.find(d=>d.code.toLowerCase()===code.toLowerCase());
  if(!dc){el('q_codemsg').innerHTML='<span style="color:var(--danger)">유효하지 않은 코드</span>';return;}
  el('q_dkind').value=dc.kind;el('q_dval').value=dc.value;quoteCtx.discount_code=dc.code;
  el('q_codemsg').innerHTML=`적용됨: <b>${esc(dc.label||dc.code)}</b> (${dc.kind==='percent'?dc.value+'%':won(dc.value)})`;calcQuote();}

  ]);

    return `<tr><td><b>${esc(ag.name)}</b>${ag.is_followkorea?' <span class="tag t-confirmed">FK</span>':''}</td>
      <td class="right">${a.cnt}건</td><td class="right">${won(a.rev)}</td>

      <td class="right"><b id="comm_${ag.id}">${won(comm)}</b></td>
      <td>${!s?'<span class="muted">미정산</span>':(s.status==='paid'?'<span class="tag t-paid">지급완료</span>':(s.tax_issued?'<span class="tag t-confirmed">세금계산서 발행</span>':'<span class="tag t-unpaid">정산생성</span>'))}</td>
      <td class="right">${!s?`<button class="btn sm" onclick="makeSettle('${ag.id}',${a.rev})">정산 생성</button>`:(s.status==='paid'?'':(s.tax_issued?'':`<button class="btn sm ghost" onclick="issueTax('${s.id}')">세금계산서</button> `)+`<button class="btn sm ok" onclick="paySettle('${s.id}')">지급완료</button>`)}</td></tr>`;}).join('');
  const totRev=Object.values(agg).reduce((s,a)=>s+a.rev,0);

     <div class="stat"><div class="k">에이전시 매출(당월)</div><div class="v">${won(totRev)}</div></div>
     <div class="stat"><div class="k">에이전시 수</div><div class="v">${state.agencies.length}<small> 곳</small></div></div>
     <div class="stat"><div class="k">정산 대상 월</div><div class="v" style="font-size:19px">${setMonth}</div></div></div>
   <div class="panel"><div class="ph">에이전시별 정산 (수수료율 수정 가능)</div><div class="pb">
     <table><thead><tr><th>에이전시</th><th class="right">건수</th><th class="right">매출</th><th class="right">수수료율</th><th class="right">수수료</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table>

  if(error){alert('실패: '+error.message);return;}renderSettlement();}
async function issueTax(id){await db.from('settlements').update({tax_issued:true,tax_issued_at:new Date().toISOString().slice(0,10),updated_at:new Date().toISOString()}).eq('id',id);renderSettlement();}
async function paySettle(id){await db.from('settlements').update({status:'paid',paid_at:new Date().toISOString().slice(0,10),updated_at:new Date().toISOString()}).eq('id',id);renderSettlement();}

/* ============ AGENCIES / 에이전시 등록 ============ */
async function renderAgencies(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const {data}=await db.from('agencies').select('*').order('name');state.agencies=data||[];
  const rows=state.agencies.map(a=>{const pm=a.payout_method||{};const rate=a.commission_rate!=null?a.commission_rate:(a.is_followkorea?15:10);return `<tr>
    <td><b>${esc(a.name)}</b>${a.is_followkorea?' <span class="tag t-confirmed">FK</span>':''}</td>
    <td>${esc(a.contact_name||'-')}</td>
    <td>${a.phone?esc(a.phone):'-'}${a.email?'<div class="cny">'+esc(a.email)+'</div>':''}</td>
    <td class="right">${rate}%</td>
    <td>${esc(pm.bank||'-')} ${esc(pm.account||'')}</td>
    <td class="muted">${esc(a.memo||'')}</td>
    <td class="right"><button class="btn sm ghost" onclick="agencyModal('${a.id}')">수정</button></td></tr>`;}).join('');
  m.innerHTML=`<div class="page-head"><div><h2>에이전시 관리</h2><div class="sub">전체 ${state.agencies.length}곳</div></div>
     <button class="btn" onclick="agencyModal()">+ 에이전시 등록</button></div>
   <div class="panel"><div class="pb">${state.agencies.length?`<table><thead><tr><th>이름</th><th>담당자</th><th>연락처</th><th class="right">수수료율</th><th>계좌</th><th>메모</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">등록된 에이전시가 없습니다.</div>'}</div></div>`;
}
function agencyModal(id){const a=id?state.agencies.find(x=>x.id===id):null;const pm=(a&&a.payout_method)||{};
  openModal(`<div class="mh">${a?'에이전시 수정':'에이전시 등록'}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="field"><label>에이전시명 *</label><input id="ag_name" value="${a?esc(a.name):''}"></div>
    <div class="field"><label><input type="checkbox" id="ag_fk" ${a&&a.is_followkorea?'checked':''}> 팔로우코리아(FK) 계열</label></div>
    <div class="grid2"><div class="field"><label>담당자</label><input id="ag_contact" value="${a?esc(a.contact_name||''):''}"></div>
      <div class="field"><label>수수료율(%)</label><input id="ag_rate" type="number" list="ratelist" value="${a&&a.commission_rate!=null?a.commission_rate:''}" placeholder="선택 또는 직접입력">
        <datalist id="ratelist"><option value="5"></option><option value="7"></option><option value="10"></option><option value="12"></option><option value="15"></option><option value="20"></option></datalist></div></div>
    <div class="grid2"><div class="field"><label>전화번호</label><input id="ag_phone" value="${a?esc(a.phone||''):''}"></div>
      <div class="field"><label>이메일</label><input id="ag_email" type="email" value="${a?esc(a.email||''):''}"></div></div>
    <div class="grid2"><div class="field"><label>은행</label><input id="ag_bank" value="${esc(pm.bank||'')}"></div>
      <div class="field"><label>계좌번호</label><input id="ag_acc" value="${esc(pm.account||'')}"></div></div>
    <div class="field"><label>예금주</label><input id="ag_holder" value="${esc(pm.holder||'')}"></div>
    <div class="field"><label>메모</label><textarea id="ag_memo">${a?esc(a.memo||''):''}</textarea></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="saveAgency('${id||''}')">저장</button></div>`);}
async function saveAgency(id){const name=el('ag_name').value.trim();if(!name){alert('에이전시명을 입력하세요');return;}
  const rv=el('ag_rate').value;
  const row={hospital_id:state.hospital_id,name,is_followkorea:el('ag_fk').checked,
    contact_name:el('ag_contact').value||null,phone:el('ag_phone').value||null,email:el('ag_email').value||null,
    commission_rate:rv===''?null:Number(rv),
    payout_method:{bank:el('ag_bank').value||'',account:el('ag_acc').value||'',holder:el('ag_holder').value||''},
    memo:el('ag_memo').value||null};
  let error;
  if(id){({error}=await db.from('agencies').update(row).eq('id',id));}
  else{({error}=await db.from('agencies').insert(row));}
  if(error){alert('저장 실패: '+error.message);return;}
  const {data}=await db.from('agencies').select('*').order('name');state.agencies=data||[];
  closeModal();renderAgencies();}

/* ============ PACKAGES / 패키지 관리 ============ */
let pkgRows=[];
async function loadPackages(){
  const [{data:pkgs},{data:items}]=await Promise.all([
    db.from('packages').select('*').eq('is_active',true).order('ptype').order('name'),
    db.from('package_items').select('*').order('sort')]);
  state.packages=(pkgs||[]).map(p=>({...p,items:(items||[]).filter(i=>i.package_id===p.id)}));
}
async function renderPackages(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  await loadPackages();
  const rows=state.packages.map(p=>`<tr>
    <td><b>${esc(p.name)}</b></td><td>${esc(p.ptype||'-')}</td>
    <td>${p.items.length}개</td><td class="right"><b>${won(p.total_price)}</b><div class="cny">${cny(p.total_price)}</div></td>
    <td class="right"><button class="btn sm ghost" onclick="pkgView('${p.id}')">구성</button>
      <button class="btn sm ghost" onclick="packageModal('${p.id}')">수정</button>
      <button class="btn sm danger" onclick="delPackage('${p.id}')">삭제</button></td></tr>`).join('');
  m.innerHTML=`<div class="page-head"><div><h2>패키지 관리</h2><div class="sub">전체 ${state.packages.length}개 · 이름·구성 항목·가격 직접 편집</div></div>
     <button class="btn" onclick="packageModal()">+ 패키지 등록</button></div>
   <div class="panel"><div class="pb">${state.packages.length?`<table><thead><tr><th>패키지명</th><th>구분</th><th>구성</th><th class="right">합계</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">패키지가 없습니다. 상단 버튼으로 등록하세요.</div>'}</div></div>`;
}
function packageModal(id){const p=id?state.packages.find(x=>x.id===id):null;
  pkgRows=p&&p.items.length?p.items.map(i=>({name:i.name,price:Number(i.price),qty:i.qty||1})):[{name:'',price:0,qty:1}];
  openModal(`<div class="mh">${p?'패키지 수정':'패키지 등록'}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="grid2"><div class="field"><label>패키지명 *</label><input id="pk_name" value="${p?esc(p.name):''}"></div>
      <div class="field"><label>구분 (혈액/지방/골수 등)</label><input id="pk_type" value="${p?esc(p.ptype||''):''}" placeholder="예: 혈액"></div></div>
    <div class="field"><label>구성 항목 (시술명 / 가격 / 수량)</label><div id="pk_items"></div>
      <button class="btn sm ghost" onclick="pkgAddRow()">+ 항목 추가</button></div>
    <div class="totrow big"><span>합계</span><span id="pk_total">₩0</span></div>
    <div class="field"><label>메모</label><input id="pk_memo" value="${p?esc(p.memo||''):''}"></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="savePackage('${id||''}')">저장</button></div>`,true);
  drawPkgRows();
}
function drawPkgRows(){
  el('pk_items').innerHTML=pkgRows.map((r,i)=>`<div style="display:grid;grid-template-columns:1fr 130px 60px 32px;gap:6px;margin-bottom:6px">
    <input placeholder="시술명" value="${esc(r.name)}" oninput="pkgSet(${i},'name',this.value)">
    <input type="number" placeholder="가격(원)" value="${r.price}" oninput="pkgSet(${i},'price',this.value)">
    <input type="number" placeholder="수량" value="${r.qty}" oninput="pkgSet(${i},'qty',this.value)">
    <button class="btn sm danger" onclick="pkgDelRow(${i})">×</button></div>`).join('');
  pkgTotal();
}
function pkgSet(i,k,v){pkgRows[i][k]=k==='name'?v:(Number(v)||0);pkgTotal();}
function pkgAddRow(){pkgRows.push({name:'',price:0,qty:1});drawPkgRows();}
function pkgDelRow(i){pkgRows.splice(i,1);if(!pkgRows.length)pkgRows.push({name:'',price:0,qty:1});drawPkgRows();}
function pkgTotal(){const t=pkgRows.reduce((s,r)=>s+r.price*r.qty,0);el('pk_total').innerHTML=won(t)+' <span class="cny" style="font-size:13px">'+cny(t)+'</span>';return t;}
async function savePackage(id){
  const name=el('pk_name').value.trim();if(!name){alert('패키지명을 입력하세요');return;}
  const items=pkgRows.filter(r=>r.name.trim());if(!items.length){alert('구성 항목을 최소 1개 입력하세요');return;}
  const total=items.reduce((s,r)=>s+r.price*r.qty,0);
  const prow={hospital_id:state.hospital_id,name,ptype:el('pk_type').value||null,total_price:total,memo:el('pk_memo').value||null};
  let pkgId=id;
  if(id){const {error}=await db.from('packages').update(prow).eq('id',id);if(error){alert('저장 실패: '+error.message);return;}
    await db.from('package_items').delete().eq('package_id',id);}
  else{const {data,error}=await db.from('packages').insert(prow).select().single();if(error){alert('저장 실패: '+error.message);return;}pkgId=data.id;}
  const irows=items.map((r,idx)=>({hospital_id:state.hospital_id,package_id:pkgId,name:r.name,price:r.price,qty:r.qty,sort:idx+1}));
  const {error:e2}=await db.from('package_items').insert(irows);if(e2){alert('항목 저장 실패: '+e2.message);return;}
  closeModal();renderPackages();
}
async function delPackage(id){if(!confirm('이 패키지를 삭제할까요?'))return;
  await db.from('package_items').delete().eq('package_id',id);
  const {error}=await db.from('packages').delete().eq('id',id);
  if(error){alert('삭제 실패: '+error.message);return;}renderPackages();}

/* ============ REFERRERS / 왕홍·소개자 ============ */
async function renderReferrers(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const {data}=await db.from('referrers').select('*').eq('is_active',true).order('name');state.referrers=data||[];
  const rows=state.referrers.map(r=>`<tr>
    <td><b>${esc(r.name)}</b></td><td>${esc(r.rtype||'-')}</td><td>${esc(r.channel||'-')}</td>
    <td class="right">${r.rate}%</td><td class="muted">${esc(r.memo||'')}</td>
    <td class="right"><button class="btn sm ghost" onclick="referrerModal('${r.id}')">수정</button>
      <button class="btn sm danger" onclick="delReferrer('${r.id}')">삭제</button></td></tr>`).join('');
  m.innerHTML=`<div class="page-head"><div><h2>왕홍·소개자 관리</h2><div class="sub">전체 ${state.referrers.length}명 · 유형·채널·수수료율</div></div>
     <button class="btn" onclick="referrerModal()">+ 소개자 등록</button></div>
   <div class="panel"><div class="pb">${state.referrers.length?`<table><thead><tr><th>이름</th><th>유형</th><th>채널</th><th class="right">수수료율</th><th>메모</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">등록된 소개자가 없습니다.</div>'}</div></div>`;
}
function referrerModal(id){const r=id?state.referrers.find(x=>x.id===id):null;
  openModal(`<div class="mh">${r?'소개자 수정':'소개자 등록'}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="grid2"><div class="field"><label>이름 *</label><input id="rf_name" value="${r?esc(r.name):''}"></div>
      <div class="field"><label>유형</label><select id="rf_type">${['왕홍','재한교포','가이드','업체','기타'].map(x=>`<option ${r&&r.rtype===x?'selected':''}>${x}</option>`).join('')}</select></div></div>
    <div class="grid2"><div class="field"><label>채널</label><input id="rf_ch" value="${r?esc(r.channel||''):''}" placeholder="웨이보/샤오홍슈/더우인"></div>
      <div class="field"><label>수수료율(%)</label><input id="rf_rate" type="number" value="${r?r.rate:10}"></div></div>
    <div class="field"><label>메모</label><input id="rf_memo" value="${r?esc(r.memo||''):''}"></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="saveReferrer('${id||''}')">저장</button></div>`);}
async function saveReferrer(id){const name=el('rf_name').value.trim();if(!name){alert('이름을 입력하세요');return;}
  const row={hospital_id:state.hospital_id,name,rtype:el('rf_type').value,channel:el('rf_ch').value||null,rate:Number(el('rf_rate').value)||0,memo:el('rf_memo').value||null};
  let error;
  if(id){({error}=await db.from('referrers').update(row).eq('id',id));}
  else{({error}=await db.from('referrers').insert(row));}
  if(error){alert('저장 실패: '+error.message);return;}
  const {data}=await db.from('referrers').select('*').eq('is_active',true).order('name');state.referrers=data||[];
  closeModal();renderReferrers();}
async function delReferrer(id){if(!confirm('이 소개자를 삭제할까요?'))return;
  const {error}=await db.from('referrers').update({is_active:false}).eq('id',id);
  if(error){alert('삭제 실패: '+error.message);return;}
  const {data}=await db.from('referrers').select('*').eq('is_active',true).order('name');state.referrers=data||[];renderReferrers();}

/* ============ REFERRER SETTLEMENT / 소개자 정산 ============ */
let refMonth=null;
async function renderRefSettle(){
  const now=new Date();if(!refMonth)refMonth=now.toISOString().slice(0,7);
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const y=+refMonth.slice(0,4),mo=+refMonth.slice(5,7)-1;
  const ms=new Date(y,mo,1).toISOString(),me=new Date(y,mo+1,1).toISOString();
  const [{data:orders},{data:setl},{data:refs}]=await Promise.all([
    db.from('orders').select('*').gte('order_date',ms).lt('order_date',me).neq('status','cancelled'),
    db.from('referrer_settlements').select('*').eq('period',refMonth),
    db.from('referrers').select('*').eq('is_active',true).order('name')]);
  state.referrers=refs||[];
  const agg={};(orders||[]).forEach(o=>{if(!o.referrer_id)return;const a=agg[o.referrer_id]=agg[o.referrer_id]||{rev:0,cnt:0};a.rev+=Number(o.total||0);a.cnt++;});
  const setlMap=Object.fromEntries((setl||[]).map(s=>[s.referrer_id,s]));
  const rows=state.referrers.map(r=>{const a=agg[r.id]||{rev:0,cnt:0};const rate=Number(r.rate)||0;const comm=Math.round(a.rev*rate/100);const s=setlMap[r.id];
    return `<tr><td><b>${esc(r.name)}</b> <span class="muted">${esc(r.rtype||'')}${r.channel?'·'+esc(r.channel):''}</span></td>
      <td class="right">${a.cnt}건</td><td class="right">${won(a.rev)}</td>
      <td class="right"><input type="number" value="${rate}" id="rr_${r.id}" style="width:56px;padding:5px;border:1px solid var(--line);border-radius:6px;text-align:right" oninput="rfRecomm('${r.id}',${a.rev})">%</td>
      <td class="right"><b id="rfc_${r.id}">${won(comm)}</b></td>
      <td>${!s?'<span class="muted">미정산</span>':(s.status==='paid'?'<span class="tag t-paid">지급완료</span>':(s.tax_issued?'<span class="tag t-confirmed">세금계산서 발행</span>':'<span class="tag t-unpaid">정산생성</span>'))}</td>
      <td class="right">${!s?`<button class="btn sm" onclick="makeRefSettle('${r.id}',${a.rev})">정산 생성</button>`:(s.status==='paid'?'':(s.tax_issued?'':`<button class="btn sm ghost" onclick="rfTax('${s.id}')">세금계산서</button> `)+`<button class="btn sm ok" onclick="rfPay('${s.id}')">지급완료</button>`)}</td></tr>`;}).join('');
  const totRev=Object.values(agg).reduce((s,a)=>s+a.rev,0);
  m.innerHTML=`<div class="page-head"><div><h2>소개자 정산</h2><div class="sub">왕홍·소개자별 소개 매출·수수료</div></div>
     <input type="month" value="${refMonth}" onchange="refMonth=this.value;renderRefSettle()" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px"></div>
   <div class="cards" style="grid-template-columns:repeat(3,1fr)">
     <div class="stat"><div class="k">소개 매출(당월)</div><div class="v">${won(totRev)}</div></div>
     <div class="stat"><div class="k">소개자 수</div><div class="v">${state.referrers.length}<small> 명</small></div></div>
     <div class="stat"><div class="k">정산 대상 월</div><div class="v" style="font-size:19px">${refMonth}</div></div></div>
   <div class="panel"><div class="ph">소개자별 정산 (수수료율 수정 가능)</div><div class="pb">
     <table><thead><tr><th>소개자</th><th class="right">건수</th><th class="right">소개 매출</th><th class="right">수수료율</th><th class="right">수수료</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>
   <div class="muted" style="font-size:12px">※ 소개자별 담당 견적의 매출을 집계해 수수료율(소개자 기본값)로 계산합니다. 정산 생성 → 세금계산서 → 지급완료 순으로 처리하세요.</div>`;
}
function rfRecomm(id,rev){const r=Number(el('rr_'+id).value||0);el('rfc_'+id).textContent=won(Math.round(rev*r/100));}
async function makeRefSettle(id,rev){const r=Number(el('rr_'+id).value||0);const comm=Math.round(rev*r/100);
  const {error}=await db.from('referrer_settlements').insert({hospital_id:state.hospital_id,referrer_id:id,period:refMonth,total_amount:comm,status:'unpaid'});
  if(error){alert('실패: '+error.message);return;}renderRefSettle();}
async function rfTax(id){await db.from('referrer_settlements').update({tax_issued:true,updated_at:new Date().toISOString()}).eq('id',id);renderRefSettle();}
async function rfPay(id){await db.from('referrer_settlements').update({status:'paid',paid_at:new Date().toISOString().slice(0,10),updated_at:new Date().toISOString()}).eq('id',id);renderRefSettle();}

boot(); /* build: v5 referrers+logoReload */
</script>
