<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강남펄스 ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
  :root{
    --brand:#0f766e; --brand-2:#14b8a6; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --card:#fff; --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Malgun Gothic',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f766e,#0d9488 60%,#0891b2)}
  .login-card{background:#fff;width:360px;padding:36px 32px;border-radius:16px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 24px;color:var(--muted);font-size:13px}
  .login-card label{display:block;font-weight:600;margin:14px 0 6px;font-size:13px}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
  .login-card button{width:100%;margin-top:22px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:15px}
  .hint{margin-top:16px;font-size:12px;color:var(--muted);background:#f8fafc;padding:10px;border-radius:8px;border:1px solid var(--line);line-height:1.6}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px}
  #app{display:none;min-height:100vh}
  .layout{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .side{background:#0f172a;color:#cbd5e1;padding:20px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{font-size:18px;font-weight:800;color:#fff;padding:4px 10px 16px;letter-spacing:-.5px}
  .brand small{display:block;font-size:11px;color:#5eead4;font-weight:600;margin-top:3px}
  .nav a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;color:#cbd5e1;text-decoration:none;font-weight:600;margin-bottom:2px;font-size:13.5px;cursor:pointer}
  .nav a:hover{background:#1e293b;color:#fff}
  .nav a.active{background:var(--brand);color:#fff}
  .nav .ico{width:16px;text-align:center}
  .nav .grp{font-size:10px;color:#64748b;padding:14px 12px 4px;font-weight:700;letter-spacing:.6px}
  .nvb{display:none;margin-left:auto;min-width:18px;height:18px;line-height:18px;border-radius:9px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:0 5px;flex:none}
  .side .who{margin-top:16px;font-size:12px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:12px}
  .side .who b{color:#e2e8f0;display:block;font-size:13px}
  .side .who button{margin-top:8px;width:100%;background:#1e293b;color:#cbd5e1;border:none;padding:7px;border-radius:7px;font-size:12px}
  .main{padding:24px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .page-head h2{margin:0;font-size:20px}
  .page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:7px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fee2e2;color:var(--danger)}
  .btn.ok{background:#16a34a}
  .btn.kakao{background:#FEE500;color:#3C1E1E}
  .btn.wechat{background:#07C160;color:#fff}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat.clk{cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .stat.clk:hover{border-color:var(--brand);box-shadow:0 3px 10px rgba(15,118,110,.15)}
  .stat .k{color:var(--muted);font-size:13px;font-weight:600}
  .stat .v{font-size:23px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .panel .pb{padding:4px 2px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f8fafc}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .t-booked{background:#e0e7ff;color:#4338ca}.t-confirmed{background:#dbeafe;color:#1d4ed8}
  .t-checked_in{background:#fef9c3;color:#a16207}.t-in_progress{background:#ffedd5;color:#c2410c}
  .t-done{background:#dcfce7;color:#15803d}.t-no_show{background:#f1f5f9;color:#64748b}.t-cancelled{background:#fee2e2;color:#b91c1c}
  .t-paid{background:#dcfce7;color:#15803d}.t-partial{background:#fef9c3;color:#a16207}
  .t-unpaid{background:#fee2e2;color:#b91c1c}.t-refunded{background:#f1f5f9;color:#64748b}.t-quote{background:#e0e7ff;color:#4338ca}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .search{flex:1;min-width:160px}
  .srch{position:relative;display:inline-block}
  .srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;pointer-events:none}
  .srch input{padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:9px;background:#fff;min-width:180px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:16px;width:540px;max-width:100%;max-height:92vh;overflow:auto}
  .modal.lg{width:920px}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:800;font-size:17px;display:flex;justify-content:space-between}
  .modal .mh span{cursor:pointer;color:var(--muted)}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px}
  .field textarea{min-height:56px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
  .muted{color:var(--muted)}.right{text-align:right}
  .detail-sec{margin-bottom:16px}
  .detail-sec h4{margin:0 0 8px;font-size:13px;color:var(--brand)}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 10px;font-size:13.5px}
  .kv .k{color:var(--muted)}
  .note-box{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .cny{color:var(--muted);font-size:12px}
  .stat-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .stat-tabs button{padding:8px 15px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:600;color:var(--muted)}
  .stat-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  @media print{.side{display:none!important}.layout{grid-template-columns:1fr!important}.page-head button,.page-head input,.stat-tabs,.toolbar{display:none!important}.modal-bg{display:none!important}}
  /* quote */
  .quote-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:start}
  .pricelist{max-height:60vh;overflow:auto}
  .pl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .pl-row:hover{background:#f0fdfa}
  .pl-row .nm{font-weight:600}.pl-row .zh{color:var(--muted);font-size:12px}
  .cart-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
  .ldisc{font-size:12px;color:var(--muted);white-space:nowrap}.ldisc input{width:46px;padding:4px;border:1px solid var(--line);border-radius:6px;text-align:right;margin-right:2px}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;font-weight:700}
  .totrow{display:flex;justify-content:space-between;padding:6px 12px;font-size:14px}
  .totrow.big{font-size:20px;font-weight:800;padding:12px;border-top:2px solid var(--ink);margin-top:4px}
  .chip{display:inline-block;background:#f1f5f9;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  /* calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{text-align:center;font-size:12px;color:var(--muted);font-weight:700;padding:4px}
  .cal .cell{min-height:78px;border:1px solid var(--line);border-radius:9px;padding:6px;background:#fff;cursor:pointer;position:relative}
  .cal .cell:hover{border-color:var(--brand)}
  .cal .cell.other{background:#f8fafc;color:#cbd5e1}
  .cal .cell.today{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
  .cal .dnum{font-size:12px;font-weight:700}
  .cal .ev{font-size:11px;background:#e0f2f1;color:#0f766e;border-radius:5px;padding:1px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal .more{font-size:11px;color:var(--muted);margin-top:2px}
  .pb{overflow-x:auto}
  #menuBtn{display:none;position:fixed;top:10px;left:10px;z-index:70;background:#0f172a;color:#fff;border:none;width:42px;height:42px;border-radius:10px;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  @media(max-width:900px){
    #menuBtn{display:block}
    .layout{grid-template-columns:1fr}
    .side{position:fixed;left:-240px;top:0;bottom:0;height:100vh;width:216px;z-index:60;transition:left .25s ease;box-shadow:4px 0 16px rgba(0,0,0,.35)}
    .side.open{left:0}
    .main{padding:60px 16px 24px}
    .cards{grid-template-columns:repeat(2,1fr)!important}
    .quote-wrap{grid-template-columns:1fr!important}
    [style*="grid-template-columns:1fr 1fr"],[style*="grid-template-columns:1.1fr 1fr"]{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
    .grid2,.grid3{grid-template-columns:1fr}
    .page-head h2{font-size:18px}
    .modal.lg{width:100%}
  }
  @media(max-width:560px){
    .cards{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"],[style*="grid-template-columns:repeat(4,1fr)"],[style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:1fr!important}
    .main{padding:58px 12px 20px}
    th,td{padding:9px 10px}
  }
</style>
</head>
<body>
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <h1>강남펄스 <span style="color:#0f766e">ERP</span></h1>
    <p>의료관광 상담·시술·정산 통합 시스템</p>
    <label>이메일</label><input id="email" type="email" placeholder="이메일 주소" autocomplete="username" />
    <label>비밀번호</label><input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
    <button id="loginBtn" type="submit">로그인</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="app">
  <button id="menuBtn" onclick="toggleSide()">☰</button>
  <div id="backdrop" onclick="toggleSide(false)"></div>
  <div class="layout">
    <aside class="side">
      <div class="brand" id="brandBox" style="cursor:pointer" onclick="location.reload()" title="새로고침">강남펄스<small id="hospName">ERP</small></div>
      <select id="hospSwitch" onchange="switchHospital(this.value)" title="병원 전환 (마스터 전용)" style="display:none;margin:2px 12px 8px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;width:calc(100% - 24px);background:#fff"></select>
      <nav class="nav" id="nav">
        <a data-view="dashboard" class="active">대시보드</a>
        <div class="grp">진료 · 접수</div>
        <a data-view="calendar">예약 캘린더</a>
        <a data-view="reception">접수 현황</a>
        <a data-view="patients">환자 CRM</a>
        <a data-view="quote">상담 · 견적</a><a data-view="platq">플랫폼 문의</a>
        <a data-view="charts">진료차트</a>
        <a data-view="tasks">할일</a>
        <a data-view="files">자료실</a>
        <a data-view="billing">수납 · 영수증</a>
        <div class="grp">매출 · 정산</div>
        <a data-view="stats">통계</a>
        <a data-view="marketing">마케팅 리포트</a>
        <a data-view="settlement">에이전시 정산</a>
        <a data-view="refsettle">소개자 정산</a>
        <div class="grp">거래처 · 상품</div>
        <a data-view="agencies">에이전시 관리</a>
        <a data-view="referrers">왕홍 · 소개자</a>
        <a data-view="packages">패키지 관리</a>
        <div class="grp owner-only">관리자</div>
        <a data-view="staff" class="owner-only">직원 관리</a>
        <a data-view="settings" class="owner-only">병원 설정</a>
        <a data-view="audit" class="owner-only">관리자 로그</a>
        <a data-view="subscription" class="owner-only">구독·이용권</a>
        <div class="grp platform-only" style="display:none">플랫폼</div>
        <a data-view="plathome" class="platform-only" style="display:none">플랫폼 홈</a>
        <a data-view="platform" class="platform-only" style="display:none">플랫폼 관리</a>
        <a data-view="demoreq" class="platform-only" style="display:none">데모 신청<span class="nvb" id="bdg_demoreq"></span></a>
        <a data-view="wanghongreq" class="platform-only" style="display:none">왕홍병원 신청<span class="nvb" id="bdg_wanghongreq"></span></a>
        <a data-view="guidereq" class="platform-only" style="display:none">가이드 신청<span class="nvb" id="bdg_guidereq"></span></a>
        <a data-view="partnerapp" class="platform-only" style="display:none">파트너 지원<span class="nvb" id="bdg_partnerapp"></span></a>
        <a data-view="partnermgmt" class="platform-only" style="display:none">파트너 관리</a>
        <a data-view="campaigns" class="platform-only" style="display:none">캠페인 관리</a>
        <a data-view="dispatch" class="platform-only" style="display:none">콜보드 (통역·가이드)</a>
      </nav>
      <div class="who"><b id="whoName">-</b><span id="whoRole" class="muted"></span>
        <button onclick="doLogout()">로그아웃</button><div id="appVer" style="margin-top:10px;font-size:11px;color:#475569;text-align:center"></div></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
const SB_URL="https://utbhlvybdutepnkvboko.supabase.co";
const SB_KEY="sb_publishable_LdLPNdjrD49iuOVLK8KVEA_SGgg9mkj";
const db=supabase.createClient(SB_URL,SB_KEY);
const APP_VERSION='v1.9.1 · 2026-07-23';
let curView='dashboard';
const KRW_PER_CNY=218; // 환율(대략) : CNY = KRW / 218

const STATUS_LABEL={booked:'예약',confirmed:'확정',checked_in:'접수완료',in_progress:'진료중',done:'완료',no_show:'노쇼',cancelled:'취소'};
const PAY_LABEL={unpaid:'미수납',partial:'부분납',paid:'완납',refunded:'환불'};
const ORD_LABEL={quote:'견적',confirmed:'확정',done:'완료',cancelled:'취소'};
const state={hospital_id:null,hospital_name:'강남펄스',staff:null,procedures:[],patients:[],agencies:[],discounts:[],packages:[],referrers:[]};
const PLAN_LABEL={basic:'기본',advanced:'고급',premium:'프리미엄'};
const PLAN_PRICE={basic:50000,advanced:100000,premium:150000};
const TIER_MENUS={
  basic:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings','marketing'],
  advanced:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings','stats','agencies','referrers','packages','settlement','refsettle','marketing'],
  premium:['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing','staff','settings','stats','agencies','referrers','packages','settlement','refsettle','audit','marketing']
};

const won=n=>'₩'+Number(n||0).toLocaleString('ko-KR');
const cny=n=>'¥'+Math.round(Number(n||0)/KRW_PER_CNY).toLocaleString('ko-KR');
const methodBadge=m=>m?`<span class="tag" style="background:#eef2ff;color:#4338ca;margin-left:4px">${esc(m)}</span>`:'';
const fdate=s=>s?new Date(s).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'-';
const ftime=s=>s?new Date(s).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
const fdt=s=>s?`${fdate(s)} ${ftime(s)}`:'-';
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const MAG='<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>';
function keepFocus(id){setTimeout(function(){const i=el(id);if(i){const v=i.value;i.focus();try{i.setSelectionRange(v.length,v.length);}catch(e){}}},0);}
const pmap=()=>Object.fromEntries(state.patients.map(p=>[p.id,p.name]));
const amap=()=>Object.fromEntries(state.agencies.map(a=>[a.id,a.name]));
let billSearch='',billSort='recent',billFrom='',billTo='';let setlSearch='',setlSort='rev';let rsSearch='',rsSort='rev';let agmSearch='',agmSort='name';let refmSearch='',refmSort='name';let chSearch='',chSort='date';let setlVat=true,rsVat=true;

async function _getIP(){try{const r=await Promise.race([fetch('https://ipwho.is/').then(x=>x.json()),new Promise(res=>setTimeout(()=>res(null),2500))]);return (r&&r.ip)||null;}catch(e){return null;}}
async function doLogin(e){
  e.preventDefault();
  const b=el('loginBtn');el('loginErr').textContent='';
  const email=el('email').value.trim(), pw=el('pw').value;
  if(!email||!pw){el('loginErr').textContent='이메일과 비밀번호를 입력하세요.';return;}
  b.disabled=true;
  const ip=await _getIP(); state._loginIP=ip;
  try{ const {data:chk}=await db.rpc('check_login',{p_email:email,p_ip:ip});
    if(chk&&chk.allowed===false){ b.disabled=false;
      el('loginErr').textContent=(chk.reason==='ip_blocked')

let _sessNonce=null,_sessTimer=null;
async function startSingleSession(uid){
  try{
    _sessNonce=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():(String(Date.now())+Math.random());
    await db.from('active_sessions').upsert({user_id:uid,nonce:_sessNonce,device_label:(navigator.userAgent||'').slice(0,80),updated_at:new Date().toISOString()},{onConflict:'user_id'});
  }catch(e){}
  if(_sessTimer)clearInterval(_sessTimer);
  _sessTimer=setInterval(async function(){
    try{
      const {data}=await db.from('active_sessions').select('nonce').eq('user_id',uid).maybeSingle();
      if(data&&data.nonce&&_sessNonce&&data.nonce!==_sessNonce){
        clearInterval(_sessTimer);_sessTimer=null;
        try{await db.auth.signOut();}catch(e){}
        alert('다른 기기에서 이 계정으로 로그인되어, 이 기기는 로그아웃됩니다.');
        location.reload();
      }
    }catch(e){}
  },20000);
}

async function pAppSetStatus(id,val){

  logAudit('파트너지원 상태변경',(r?r.name+' · ':'')+(P_APP_ST[val]||val));

async function pAppDelete(id){

  const r=(state._pApps||[]).find(function(x){return x.id===id;});

async function pAppApprove(id){

  const ins={application_id:r.id,ptype:r.ptype,name:r.name,residence_country:r.residence_country,
    payout_route:(r.residence_country==='CN'?'yueji_cny':'domestic_33'),
    languages:r.languages||[],contact:r.contact||{},sns_channels:r.sns_channels||[],memo:r.memo||null};

}

function pSafeName(n){var i=n.lastIndexOf('.');var ext=i>0?n.slice(i):'';return n.slice(0,i>0?i:n.length).replace(/[^0-9A-Za-z가-힣_-]/g,'_').slice(0,40)+ext;}
async function pUploadFile(pid,kind,f){
  const path=pid+'/'+kind+'_'+Date.now()+'_'+pSafeName(f.name);
  const up=await db.storage.from('partner-docs').upload(path,f,{contentType:f.type||undefined,upsert:false});
  if(up.error)throw up.error;
  return path;
}
async function pFileOpen(path){
  const {data,error}=await db.storage.from('partner-docs').createSignedUrl(path,3600);
  if(error||!data||!data.signedUrl){alert('파일을 열 수 없습니다: '+((error&&error.message)||''));return;}
  window.open(data.signedUrl,'_blank');
}
async function pAddContract(pid){
  try{
    const ent=el('pm_c_ent').value, signed=el('pm_c_signed').value, valid=el('pm_c_valid').value;
    const f=el('pm_c_file').files[0];
    let fp=null; if(f)fp=await pUploadFile(pid,'contract',f);
    const {error}=await db.from('partner_contracts').insert({partner_id:pid,contract_entity:ent,
      status:signed?'signed':'draft',signed_at:signed||null,valid_from:signed||null,valid_to:valid||null,file_path:fp});
    if(error)throw error;
    logAudit('파트너 계약 등록',pid+' · '+(P_C_ENT[ent]||ent));
    pLoadExtra(pid);
  }catch(e){alert('계약 등록 실패: '+(e.message||e));}
}
async function pContractSign(cid,pid){
  const today=new Date().toISOString().slice(0,10);
  const {error}=await db.from('partner_contracts').update({status:'signed',signed_at:today,valid_from:today}).eq('id',cid);
  if(error){alert('처리 실패: '+error.message);return;}
  logAudit('파트너 계약 서명처리',cid);
  pLoadExtra(pid);
}
async function pContractDel(cid,pid){
  if(!confirm('이 계약 기록을 삭제할까요?'))return;
  const {error}=await db.from('partner_contracts').delete().eq('id',cid);
  if(error){alert('삭제 실패: '+error.message);return;}
  pLoadExtra(pid);
}
async function pDocUpload(pid){
  try{
    const f=el('pm_d_file').files[0];
    if(!f){alert('파일을 선택하세요.');return;}
    if(f.size>10*1024*1024){alert('10MB 이하 파일만 업로드할 수 있습니다.');return;}
    const dtype=el('pm_d_type').value, exp=el('pm_d_exp').value;
    const fp=await pUploadFile(pid,dtype,f);
    const {error}=await db.from('partner_documents').insert({partner_id:pid,dtype:dtype,file_path:fp,expires_on:exp||null});
    if(error)throw error;
    logAudit('파트너 서류 업로드',pid+' · '+(P_D_TYPE[dtype]||dtype));
    pLoadExtra(pid);
  }catch(e){alert('업로드 실패: '+(e.message||e));}
}
async function pDocVerify(did,pid,val){
  const {error}=await db.from('partner_documents').update({verified:val}).eq('id',did);
  if(error){alert('저장 실패: '+error.message);pLoadExtra(pid);}
}
async function pDocDel(did,pid,path){
  if(!confirm('이 서류를 삭제할까요? 파일도 함께 삭제됩니다.'))return;

const CP_ST={planned:'준비중',active:'진행중',done:'완료',cancelled:'취소'};
const CP_ST_COLOR={planned:'#b45309',active:'#0f766e',done:'#64748b',cancelled:'#dc2626'};
const CP_PLAT={xiaohongshu:'샤오홍슈',douyin:'더우인',weibo:'웨이보',wechat:'위챗',instagram:'인스타그램',youtube:'유튜브',other:'기타'};
const CP_PROG=['왕홍1 (500만/1개월)','왕홍22 (1,000만/1개월)','왕홍333 (3,000만/3개월)','기타'];
const CP_GOAL={leads:'상담 문의 건수',treatments:'시술 완료 건수',views:'총 조회수',revenue:'매출 (원)',custom:'직접 입력'};
const CP_GOAL_UNIT={leads:'건',treatments:'건',views:'회',revenue:'원',custom:''};
const CP_GOAL_AUTO={leads:1,treatments:1,views:1}; // 자동 집계 지표
function cpAchieveCalc(c,leadsTotal,treated,viewsTotal){
  if(!c.goal_metric||c.goal_value==null)return null;
  const gv=Number(c.goal_value)||0;
  let actual,auto=true;
  if(c.goal_metric==='leads')actual=leadsTotal;
  else if(c.goal_metric==='treatments')actual=treated;
  else if(c.goal_metric==='views')actual=viewsTotal;
  else {actual=Number(c.goal_actual)||0;auto=false;}
  const pct=gv?Math.round(actual/gv*100):0;
  const unit=c.goal_metric==='custom'?(c.goal_unit||''):CP_GOAL_UNIT[c.goal_metric];
  return {actual:actual,goal:gv,pct:pct,auto:auto,metric:c.goal_metric,unit:unit,label:CP_GOAL[c.goal_metric]};
}
function cpAchieveBar(a){
  if(!a)return '';
  const w=Math.min(100,Math.max(0,a.pct));
  const col=a.pct>=100?'#0f766e':(a.pct>=60?'#b45309':'#dc2626');
  const fv=function(v){return a.metric==='revenue'?won(v):fmtN(v)+(a.unit||'');};
  return '<div><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px"><span style="font-weight:800">'+a.label+' 목표 달성</span><span style="font-weight:800;color:'+col+'">'+a.pct+'% <span style="color:var(--muted);font-weight:400">('+fv(a.actual)+' / '+fv(a.goal)+')</span></span></div>'
    +'<div style="height:11px;border-radius:6px;background:#eef2f7;overflow:hidden"><div style="height:100%;width:'+w+'%;background:'+col+';transition:width .3s"></div></div></div>';
}

async function cpSave(id){
  const name=el('cp_name').value.trim();
  if(!name){alert('캠페인명을 입력하세요.');return;}
  const gm=el('cp_gmetric').value||null;
  const row={hospital_id:el('cp_hosp').value,name:name,program:el('cp_prog').value,executor:el('cp_exec').value,
    status:el('cp_status').value,starts_on:el('cp_start').value||null,ends_on:el('cp_end').value||null,
    goal:el('cp_goal').value.trim()||null,memo:el('cp_memo').value.trim()||null,
    goal_metric:gm,goal_value:el('cp_gvalue').value?Number(el('cp_gvalue').value):null,
    goal_unit:(gm==='custom'?(el('cp_gunit').value.trim()||null):null),
    updated_at:new Date().toISOString()};
  let error, newId=id;
  if(id){ error=(await db.from('campaigns').update(row).eq('id',id)).error; }
  else { const r=await db.from('campaigns').insert(row).select('id').single(); error=r.error; newId=r.data&&r.data.id; }
  if(error){alert('저장 실패: '+error.message);return;}
  logAudit(id?'캠페인 수정':'캠페인 등록',name);
  closeModal();
  if(newId)renderCampaignDetail(newId); else renderCampaigns();
}

async function djSave(id){
  const title=el('dj_title').value.trim(), date=el('dj_date').value;
  if(!title){alert('제목을 입력하세요.');return;}
  if(!date){alert('날짜를 선택하세요.');return;}
  const row={title:title,job_type:el('dj_type').value,hospital_id:el('dj_hosp').value||null,
    job_date:date,start_time:el('dj_time').value.trim()||null,language:el('dj_lang').value.trim()||null,
    location:el('dj_loc').value.trim()||null,duration_hours:el('dj_dur').value?Number(el('dj_dur').value):null,
    fee:Number(el('dj_fee').value)||0,memo:el('dj_memo').value.trim()||null,updated_at:new Date().toISOString()};
  let error;
  if(id){ error=(await db.from('dispatch_jobs').update(row).eq('id',id)).error; }
  else { error=(await db.from('dispatch_jobs').insert(row)).error; }
  if(error){alert('저장 실패: '+error.message);return;}
  logAudit(id?'콜 수정':'콜 등록',title);
  closeModal();renderDispatch();
}

async function djAssign(jid,pid){
  const p=(state._djPartners||[]).find(function(x){return x.id===pid;});
  if(!confirm('['+((p&&p.name)||'')+'] 파트너를 이 콜에 배정할까요?'))return;
  const {error}=await db.from('dispatch_jobs').update({status:'assigned',assigned_partner_id:pid,assigned_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',jid);
  if(error){alert('배정 실패: '+error.message);return;}
  // 지원 기록 있으면 accepted 처리, 없으면 생성(운영자 대리)
  await db.from('dispatch_applies').upsert({job_id:jid,partner_id:pid,status:'accepted'},{onConflict:'job_id,partner_id'});
  await db.from('dispatch_applies').update({status:'rejected'}).eq('job_id',jid).neq('partner_id',pid).eq('status','applied');
  logAudit('콜 배정',(p&&p.name)||pid);
  djDetail(jid);
}
async function djComplete(jid){
  if(!confirm('이 콜을 완료 처리할까요? 배정 파트너의 정산 대상이 됩니다.'))return;
  const {error}=await db.from('dispatch_jobs').update({status:'done',completed_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',jid);
  if(error){alert('완료 처리 실패: '+error.message);return;}
  logAudit('콜 완료',jid);djDetail(jid);
}
async function djCancel(jid){
  if(!confirm('이 콜을 취소할까요?'))return;
  const {error}=await db.from('dispatch_jobs').update({status:'cancelled',updated_at:new Date().toISOString()}).eq('id',jid);
  if(error){alert('취소 실패: '+error.message);return;}

}

async function renderMarketing(){

  if(!(cps||[]).length){
    m.innerHTML='<div class="page-head"><div><h2>마케팅 리포트</h2><div class="sub">왕홍 캠페인 성과 리포트</div></div></div>'
      +'<div class="panel"><div class="pb" style="padding:36px 20px;text-align:center;color:var(--muted)">아직 진행 중인 마케팅 캠페인이 없습니다.<br style="margin-bottom:6px">왕홍 마케팅 프로그램이 궁금하시면 팔로우코리아 담당자에게 문의해주세요.</div></div>';
    return;
  }
  const cids=cps.map(function(c){return c.id;});
  const {data:posts}=await db.from('campaign_posts').select('id,campaign_id,platform,title,url,posted_on,content_type').in('campaign_id',cids);
  const pids=(posts||[]).map(function(p){return p.id;});
  let ms=[];
  if(pids.length){ ms=((await db.from('campaign_metrics').select('post_id,metric_date,views,likes,comments,saves').in('post_id',pids).order('metric_date')).data)||[]; }
  const latest={}; ms.forEach(function(x){latest[x.post_id]=x;});
  const funnels={};
  await Promise.all(cps.map(async function(c){ try{ const r=await db.rpc('campaign_funnel',{p_campaign:c.id}); funnels[c.id]=r.data||null; }catch(e){} }));
  const secs=cps.map(function(c){
    const cposts=(posts||[]).filter(function(p){return p.campaign_id===c.id;});
    const tot={views:0,likes:0,comments:0,saves:0};
    cposts.forEach(function(p){var l=latest[p.id];if(l){tot.views+=Number(l.views)||0;tot.likes+=l.likes||0;tot.comments+=l.comments||0;tot.saves+=l.saves||0;}});
    const f=funnels[c.id]||{total:0,confirmed:0,visited:0,treated:0};
    const funnel='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'
      +[['상담 문의',f.total],['예약 확정',f.confirmed],['내원',f.visited],['시술 진행',f.treated]].map(function(x){
        return '<div style="flex:1;min-width:100px;background:#f4f7fc;border-radius:10px;padding:10px 12px;text-align:center"><div style="font-size:19px;font-weight:800;color:var(--brand,#1F3864)">'+fmtN(x[1])+'</div><div style="font-size:11px;color:var(--muted)">'+x[0]+'</div></div>';
      }).join('')+'</div>';
    // 주차별 조회수 추이 (지표 기준일별 합산, 최근 8개)
    const byDate={};
    ms.forEach(function(x){ if(cposts.some(function(p){return p.id===x.post_id;})){ byDate[x.metric_date]=(byDate[x.metric_date]||0)+(Number(x.views)||0); } });
    const dates=Object.keys(byDate).sort().slice(-8);
    const maxV=Math.max.apply(null,dates.map(function(d){return byDate[d];}).concat([1]));
    const trend=dates.length?'<div style="margin-top:12px">'+dates.map(function(d){
      const w=Math.max(3,Math.round(byDate[d]/maxV*100));

    }).join('')+'<div class="cny">기준일별 누적 조회수</div></div>':'';
    const prow=cposts.length?cposts.map(function(p){

    }).join(''):'<tr><td colspan="5" class="muted" style="text-align:center;padding:12px">게시물 준비 중입니다.</td></tr>';
    return '<div class="panel"><div class="pb" style="padding:14px 16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">'

      +'<div class="cny">'+esc(c.program||'')+' · '+(c.starts_on||'?')+' ~ '+(c.ends_on||'?')+'</div></div>'
      +'<div style="font-size:12px;color:var(--muted)">누적 조회 <b style="color:var(--brand,#1F3864)">'+fmtN(tot.views)+'</b> · 좋아요 '+fmtN(tot.likes)+' · 저장 '+fmtN(tot.saves)+'</div></div>'

    +secs
    +'<div class="panel"><div class="pb" style="padding:12px 16px;font-size:12px;color:var(--muted);line-height:1.8">· 지표는 팔로우코리아가 주기적으로 집계한 스냅샷 기준이며, 플랫폼 사정에 따라 실제와 차이가 있을 수 있습니다.<br>· 상담 문의~시술 진행 퍼널은 팔로우코리아 파트너 채널을 통해 등록된 고객 기준입니다.</div></div>';
}

async function submitOnboard(){

  btn.disabled=true; const old=btn.textContent; btn.textContent='생성 중…';
  try{
    const { data, error } = await db.functions.invoke('onboard-hospital', { body:{

async function renderDashboard(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const ds=new Date(y,mo,now.getDate()).toISOString(),de=new Date(y,mo,now.getDate()+1).toISOString();
  const ms=new Date(y,mo,1).toISOString(),me=new Date(y,mo+1,1).toISOString();
  const trendStart=new Date(y,mo-5,1).toISOString();
  const [appt,monOrders,pat,recent,trend,allOrd,rvLogs,hospC]=await Promise.all([
    db.from('appointments').select('*').eq('hospital_id',state.hospital_id).gte('appointment_at',ds).lt('appointment_at',de).order('appointment_at'),
    db.from('orders').select('total,pay_status,order_date,status').eq('hospital_id',state.hospital_id).gte('order_date',ms).lt('order_date',me).neq('status','cancelled'),
    db.from('patients').select('id',{count:'exact',head:true}),
    db.from('orders').select('*').eq('hospital_id',state.hospital_id).order('order_date',{ascending:false}).limit(6),
    db.from('orders').select('total,order_date,status').eq('hospital_id',state.hospital_id).gte('order_date',trendStart).neq('status','cancelled'),
    db.from('orders').select('patient_id,order_date').eq('hospital_id',state.hospital_id).neq('status','cancelled'),
    db.from('revisit_logs').select('patient_id,created_at').eq('hospital_id',state.hospital_id),
    db.from('hospitals').select('contact').eq('id',state.hospital_id).single(),
  ]);

  const monSales=mons.reduce((s,o)=>s+Number(o.total||0),0);
  const unpaid=mons.filter(o=>o.pay_status!=='paid').reduce((s,o)=>s+Number(o.total||0),0);
  const PM=pmap(),AM=amap();
  const months=[];for(let k=5;k>=0;k--){const d=new Date(y,mo-k,1);months.push({key:d.getFullYear()+'-'+(d.getMonth()+1),label:(d.getMonth()+1)+'월',sum:0});}
  (trend.data||[]).forEach(o=>{const d=new Date(o.order_date);const key=d.getFullYear()+'-'+(d.getMonth()+1);const mm=months.find(x=>x.key===key);if(mm)mm.sum+=Number(o.total||0);});

  const chart=`<div style="display:flex;align-items:flex-end;gap:14px;height:180px;padding:16px 12px 4px">${months.map(x=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
     <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${x.sum?(Math.round(x.sum/10000)+'만'):''}</div>
     <div style="width:58%;background:linear-gradient(180deg,#14b8a6,#0f766e);border-radius:6px 6px 0 0;height:${Math.round(x.sum/maxSum*130)}px;min-height:${x.sum?4:0}px"></div>
     <div style="font-size:12px;color:var(--muted);margin-top:6px">${x.label}</div></div>`).join('')}</div>`;
  let revisitPanel='';

    revisitPanel=`<div class="panel"><div class="ph">재방문 도래 (${due.length}명 · ${recallDays}일+ 경과) <span class="muted" style="font-size:11px;font-weight:400">마지막 방문 기준 · 위챗 안내 후 '발송 기록'</span></div><div class="pb">${due.length?`<table><thead><tr><th>환자</th><th>마지막 방문</th><th class="right">경과</th><th>액션</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">재방문 도래 환자가 없습니다.</div>'}</div></div>`;

   </div>
   ${revisitPanel}
   <div class="panel"><div class="ph">최근 6개월 매출 추이</div>${chart}</div>
   <div class="panel"><div class="ph">오늘 예약 <button class="btn sm" onclick="navTo('reception')">접수 →</button></div>
     <div class="pb">${appts.length?`<table><thead><tr><th>시간</th><th>환자</th><th>담당</th><th>상태</th></tr></thead><tbody>${
       appts.map(a=>`<tr><td>${ftime(a.appointment_at)}</td><td>${esc(PM[a.patient_id]||'환자')}</td><td>${esc(a.doctor||'-')}</td><td><span class="tag t-${a.status}">${STATUS_LABEL[a.status]}</span></td></tr>`).join('')

   <div class="panel"><div class="ph">최근 상담·견적 <button class="btn sm" onclick="navTo('billing')">수납 →</button></div>
     <div class="pb">${(recent.data||[]).length?`<table><thead><tr><th>No</th><th>환자</th><th>에이전시</th><th class="right">금액</th><th>수납</th></tr></thead><tbody>${
       recent.data.map(o=>`<tr><td>#${o.order_no}</td><td>${esc(PM[o.patient_id]||'-')}</td><td>${esc(AM[o.agency_id]||'-')}</td><td class="right">${won(o.total)}</td><td><span class="tag t-${o.pay_status}">${PAY_LABEL[o.pay_status]}</span>${o.pay_status==='paid'?methodBadge(o.pay_method):''}</td></tr>`).join('')
     }</tbody></table>`:'<div class="empty">견적이 없습니다.</div>'}</div></div>`;

function CARE_GUIDES(hosp,nm){
  const hi='【'+hosp+'】\n您好'+(nm?('，'+nm):'')+'！';
  return [
    { key:'aftercare', label:'시술 후 케어 안내', desc:'시술 직후 · 주의사항 중심',
      msg:hi+'\n感谢您的到院。为了让效果更稳定，请注意以下术后护理：\n① 术后3天内避免高温桑拿、剧烈运动及饮酒\n② 注意防晒与保湿，按医嘱使用护理产品\n③ 如有红肿、异常不适，请及时与我们联系\n我们会持续关注您的恢复，祝您早日呈现理想效果！' },
    { key:'maintain', label:'효과 유지·재방문 제안', desc:'효과 유지 시점 · 재방문 유도',
      msg:hi+'\n距离您上次到院已有一段时间。为维持并提升效果，现在是进行复诊或补充护理的理想时机。\n我们可根据您目前的状态提供个性化护理方案。\n如需预约，请随时与我们联系，期待您的再次光临！' },
    { key:'reminder', label:'정기 관리 리마인드', desc:'오래된 고객 · 재활성화',
      msg:hi+'\n好久不见，我们一直记得您。\n为帮助您长期保持理想状态，我们为老客户准备了专属复诊与护理建议。\n如您近期有护理计划，欢迎随时咨询，我们很乐意为您安排。' },
  ];
}
function revisitMsg(pid){
  const p=(state.patients||[]).find(x=>x.id===pid);if(!p){alert('환자 정보를 찾을 수 없습니다.');return;}
  const nm=p.name||'',hosp=state.hospital_name||'';
  const guides=CARE_GUIDES(hosp,nm);
  const cards=guides.map(function(g,i){
    return '<div style="border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><b style="font-size:14px">'+g.label+'</b> <span class="cny">'+g.desc+'</span></div>'
      +'<button class="btn sm wechat" onclick="careGuideCopy('+i+',\''+pid+'\')">복사</button></div>'
      +'<div style="white-space:pre-wrap;font-size:12.5px;color:#475569;margin-top:8px;background:#f8fafc;border-radius:8px;padding:10px;line-height:1.6">'+esc(g.msg)+'</div></div>';

function reviewModal(pid){

async function saveReview(pid){
  var nps=(el('rv_nps')&&el('rv_nps').value!=='')?parseInt(el('rv_nps').value,10):null;
  if(nps!=null&&(nps<0||nps>10)){alert('NPS는 0~10 사이로 입력하세요');return;}
  var cm=((el('rv_comment')&&el('rv_comment').value)||'').trim()||null;
  if(nps==null&&!cm){alert('NPS 점수 또는 코멘트를 입력하세요');return;}
  const {error}=await db.from('patient_reviews').insert({hospital_id:state.hospital_id,patient_id:pid,nps:nps,comment:cm,created_by:(state.staff||{}).id,created_by_name:(state.staff||{}).name});
  if(error){alert('저장 실패: '+error.message);return;}
  try{logAudit('만족도 기록',nps!=null?('NPS '+nps):'코멘트');}catch(e){}
  patientDetail(pid);
}
async function reviewRequest(pid){
  const p=(state.patients||[]).find(x=>x.id===pid)||{};const nm=p.name||'',hosp=state.hospital_name||'';
  var msg='【'+hosp+'】\n您好'+(nm?('，'+nm):'')+'！\n感谢您选择我们。为提供更好的服务，诚邀您对本次就诊进行评价（满分10分）并留下宝贵意见。\n您的反馈对我们非常重要，期待您的再次光临！';
  var ok=false;try{await navigator.clipboard.writeText(msg);ok=true;}catch(e){try{var ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();ok=document.execCommand('copy');document.body.removeChild(ta);}catch(_){}}
  alert(ok?'리뷰 요청(중문)이 복사되었습니다.\n위챗으로 전송 후, 환자 응답은 "만족도 기록"에 입력하면 통계에 반영됩니다.':'복사 실패:\n\n'+msg);
}
async function addNote(id){const note=(el('pn_note').value||'').trim();if(!note)return;

let curCat='';
function pickCat(elx){document.querySelectorAll('#q_cats .chip').forEach(c=>c.classList.remove('on'));elx.classList.add('on');curCat=elx.dataset.cat;drawPrice();}
function drawPrice(){
  const q=(el('q_search').value||'').trim().toLowerCase();
  if(curCat==='패키지'){
    let pk=state.packages.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.ptype||'').toLowerCase().includes(q));
    el('q_price').innerHTML=pk.map(p=>`<div class="pl-row" onclick="addPkg('${p.id}')">
       <div><div class="nm">${esc(p.name)}</div><div class="zh">${esc(p.ptype||'')} 줄기세포 · ${p.items.length}개 구성 · <a onclick="event.stopPropagation();pkgView('${p.id}')" style="color:var(--brand);cursor:pointer">구성보기</a></div></div>
       <div class="right"><div><b>${won(p.total_price)}</b></div><div class="cny">${cny(p.total_price)}</div></div>
     </div>`).join('')||'<div class="empty">패키지 없음</div>';
    return;
  }
  let list=state.procedures.filter(p=>(!curCat||p.category===curCat)&&(!q||p.name.toLowerCase().includes(q)||(p.name_zh||'').toLowerCase().includes(q)));
  list=list.slice(0,300);
  el('q_price').innerHTML=list.map(p=>`<div class="pl-row" onclick="addItem('${p.id}')">
     <div><div class="nm">${esc(p.name)}</div><div class="zh">${esc(p.name_zh||'')} · ${esc(p.category)}</div></div>
     <div class="right"><div>${won(p.price)}</div><div class="cny">${p.price_cny?('¥'+Number(p.price_cny).toLocaleString()):cny(p.price)}</div></div>
   </div>`).join('')||'<div class="empty">검색 결과 없음</div>';
}
function addItem(pid){const p=state.procedures.find(x=>x.id===pid);if(!p)return;
  const ex=cart.find(c=>c.procedure_id===pid);if(ex)ex.qty++;else cart.push({procedure_id:pid,name:p.name,unit_price:Number(p.price),qty:1});
  drawCart();}
function addPkg(id){const p=state.packages.find(x=>x.id===id);if(!p)return;
  const key='pkg:'+id;const ex=cart.find(c=>c.pkey===key);if(ex)ex.qty++;
  else cart.push({procedure_id:null,pkey:key,name:'[패키지] '+p.name,unit_price:Number(p.total_price),qty:1});
  drawCart();}
function pkgView(id){const p=state.packages.find(x=>x.id===id);if(!p)return;
  openModal(`<div class="mh">${esc(p.name)}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="muted" style="margin-bottom:10px">${esc(p.ptype||'')} 줄기세포 패키지 · 합계 <b style="color:var(--ink)">${won(p.total_price)}</b> <span class="cny">(${cny(p.total_price)})</span></div>
    <table><thead><tr><th>구성 시술</th><th class="right">금액</th></tr></thead><tbody>${
      p.items.map(i=>`<tr><td>${esc(i.name)}${i.qty>1?' ×'+i.qty:''}</td><td class="right">${won(i.price*i.qty)}</td></tr>`).join('')}</tbody></table></div>

function chQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);drawCart();}
function lineNet(c){return Math.round(c.unit_price*c.qty*(1-(c.dpct||0)/100));}
function setDisc(i,v){cart[i].dpct=Math.max(0,Math.min(100,Number(v)||0));var e=el('lnet_'+i);if(e)e.textContent=won(lineNet(cart[i]));calcQuote();}
function drawCart(){
  el('q_cart').innerHTML=cart.length?cart.map((c,i)=>`<div class="cart-item">
     <div><b>${esc(c.name)}</b><div class="cny">${won(c.unit_price)}</div></div>
     <div class="qty"><button onclick="chQty(${i},-1)">−</button><b>${c.qty}</b><button onclick="chQty(${i},1)">+</button></div>
     <div class="ldisc"><input type="number" min="0" max="100" value="${c.dpct||0}" oninput="setDisc(${i},this.value)" title="이 시술 할인%">%</div>
     <div class="right"><b id="lnet_${i}">${won(lineNet(c))}</b></div>
     <button class="btn sm danger" onclick="chQty(${i},-99)">×</button></div>`).join(''):'<div class="empty" style="padding:20px">시술을 담아주세요</div>';
  calcQuote();
}
function calcQuote(){
  const sub=cart.reduce((s,c)=>s+lineNet(c),0);
  const kind=el('q_dkind').value;let val=Number(el('q_dval').value||0);let disc=0;
  if(kind==='percent')disc=Math.round(sub*Math.min(val,100)/100);else if(kind==='fixed')disc=Math.min(val,sub);
  const total=sub-disc;
  el('q_tot').innerHTML=`<div class="totrow"><span class="muted">소계</span><span>${won(sub)}</span></div>
    ${disc>0?`<div class="totrow" style="color:var(--danger)"><span>할인</span><span>-${won(disc)}</span></div>`:''}
    <div class="totrow big"><span>합계</span><span>${won(total)} <span class="cny" style="font-size:13px">${cny(total)}</span></span></div>`;
  quoteCtx.subtotal=sub;quoteCtx.discount_amount=disc;quoteCtx.total=total;quoteCtx.discount_kind=kind;quoteCtx.discount_value=val;
}
function onQuotePatient(){const p=state.patients.find(x=>x.id===el('q_pat').value);if(p&&p.source_agency_id)el('q_ag').value=p.source_agency_id;}
function applyCode(){const code=(el('q_dcode').value||'').trim();if(!code){return;}
  const dc=state.discounts.find(d=>d.code.toLowerCase()===code.toLowerCase());
  if(!dc){el('q_codemsg').innerHTML='<span style="color:var(--danger)">유효하지 않은 코드</span>';return;}
  el('q_dkind').value=dc.kind;el('q_dval').value=dc.value;quoteCtx.discount_code=dc.code;
  el('q_codemsg').innerHTML=`적용됨: <b>${esc(dc.label||dc.code)}</b> (${dc.kind==='percent'?dc.value+'%':won(dc.value)})`;calcQuote();}

function quoteText(){

  const now=new Date();

  if(ag)t+=`에이전시: ${ag.name}\n`;

async function sendWechat(){

async function sendKakao(){

  if(!el('q_pat').value){alert('환자를 선택하세요');return;}

  if(!await useQuota('msg','견적 발송')) return;

  // 0) 알림톡 자동발송(병원설정에서 사용 ON + 환자 전화번호가 있을 때)
  if(localStorage.getItem('alimtalk_on')==='1'){

  if(ensureKakao()){

      return;
    }catch(e){/* 실패 시 아래 복사 방식으로 폴백 */}
  }
  // 2) 폴백: 견적 내용을 클립보드에 복사 → 카카오톡 대화창에 붙여넣기
  let copied=false;
  try{await navigator.clipboard.writeText(text);copied=true;}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{copied=document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }
  logAudit('카카오톡 견적 전송(복사)',`${won(quoteCtx.total)}`);

function statPreset(kind){

  const fmt=x=>{const yy=x.getFullYear(),mm=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return yy+'-'+mm+'-'+dd;};
  const today=new Date(y,mo,d);
  if(kind==='day'){ statFrom=fmt(today); statTo=fmt(today); }
  else if(kind==='week'){ const dow=(today.getDay()+6)%7; statFrom=fmt(new Date(y,mo,d-dow)); statTo=fmt(new Date(y,mo,d-dow+6)); }
  else if(kind==='month'){ statFrom=fmt(new Date(y,mo,1)); statTo=fmt(new Date(y,mo+1,0)); }

function exportAuditCSV(){const rows=(state._audit||[]).map(l=>[new Date(l.created_at).toLocaleString('ko-KR'),auditWho(l),menuLabel(l.menu),l.action,l.detail||'',l.ip||'']);const head=['시각','직원','메뉴','행위','상세','IP'];const q=c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`;const csv='﻿'+[head.map(q).join(',')].concat(rows.map(r=>r.map(q).join(','))).join('\n');const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='감사로그.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}

/* ============ 직원 계정·권한 ============ */
const ROLE_LABEL={owner:'원장',manager:'매니저',desk:'데스크',viewer:'열람'};
const MENUS=[{k:'dashboard',label:'대시보드'},{k:'calendar',label:'예약 캘린더'},{k:'reception',label:'접수 현황'},{k:'patients',label:'환자 CRM'},{k:'quote',label:'상담·견적'},{k:'charts',label:'진료차트'},{k:'tasks',label:'할일'},{k:'files',label:'자료실'},{k:'billing',label:'수납·매출'},{k:'stats',label:'통계'},{k:'marketing',label:'마케팅 리포트'},{k:'settlement',label:'에이전시 정산'},{k:'agencies',label:'에이전시 관리'},{k:'packages',label:'패키지 관리'},{k:'referrers',label:'왕홍·소개자'},{k:'refsettle',label:'소개자 정산'},{k:'staff',label:'직원 관리'},{k:'settings',label:'병원 설정'},{k:'audit',label:'관리자 로그'}];
const ROLE_DESC='원장: 모든 메뉴·병원설정·직원관리 접근(전권). 매니저: 직원관리·병원설정 제외 전체 접근·편집(정산·통계 포함). 데스크: 접수·예약·환자·상담견적·진료차트·수납 등 일선 업무. 열람: 조회 전용(데이터 편집 불가).';
function roleMenus(role){const all=MENUS.map(x=>x.k);if(role==='owner')return all;const noAdmin=all.filter(k=>k!=='staff'&&k!=='settings');if(role==='desk')return ['dashboard','calendar','reception','patients','quote','charts','tasks','files','billing'];if(role==='viewer')return ['dashboard','stats','patients','billing'];return noAdmin;}
function menuCheckboxes(sel){return MENUS.filter(x=>x.k!=='staff'&&x.k!=='settings'&&x.k!=='audit').map(x=>`<label style="display:inline-flex;align-items:center;gap:5px;white-space:nowrap;padding:5px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px"><input type="checkbox" value="${x.k}" ${sel.includes(x.k)?'checked':''}> ${x.label}</label>`).join('');}
function permModal(id){const s=(state._staff||[]).find(x=>x.id===id);if(!s)return;
  const sel=(Array.isArray(s.menu_perms)&&s.menu_perms.length)?s.menu_perms:roleMenus(s.role);
  openModal(`<div class="mh">${esc(s.name)} · 권한 설정<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="field"><label>권한(역할)</label><select id="pm_role">${Object.entries(ROLE_LABEL).map(([k,v])=>`<option value="${k}" ${s.role===k?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="field"><label>노출 메뉴 (체크한 메뉴만 표시)</label><div id="pm_menus" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${menuCheckboxes(sel)}</div>
      <div class="muted" style="font-size:12px;margin-top:4px">아무것도 선택하지 않으면 역할 기본값이 적용됩니다. (직원관리·병원설정은 원장 전용)</div></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="savePerm('${id}')">저장</button></div>`,true);}
async function savePerm(id){const role=el('pm_role').value;const menus=[...document.querySelectorAll('#pm_menus input:checked')].map(i=>i.value);
  const {error}=await db.from('staff_accounts').update({role,menu_perms:menus.length?menus:null,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){alert('저장 실패: '+error.message);return;}logAudit('직원 권한변경',role);closeModal();renderStaff();}
async function saveStaffLimit(){
  const v=parseInt(el('staff_limit_in').value,10);
  if(isNaN(v)||v<1){alert('1 이상 숫자를 입력하세요');return;}
  const {error}=await db.from('hospitals').update({staff_limit:v}).eq('id',state.hospital_id);
  if(error){alert('실패: '+error.message);return;}
  logAudit('계정 한도 변경','staff_limit='+v);renderStaff();alert('계정 한도가 '+v+'개로 변경되었습니다.');
}
async function renderStaff(){
  const m=el('main');m.innerHTML='<div class="loading">불러오는 중…</div>';
  const [{data},{data:hosp}]=await Promise.all([
    db.from('staff_accounts').select('*').order('created_at'),
    db.from('hospitals').select('staff_limit').eq('id',state.hospital_id).single()
  ]);
  state._staff=data||[];
  const isPremium=state.plan_tier==='premium';
  const _floor=({basic:3,advanced:5})[state.plan_tier]||3;
  const limit=Math.max(_floor,(hosp&&typeof hosp.staff_limit==='number')?hosp.staff_limit:3);
  const activeCnt=(data||[]).filter(s=>s.is_active).length;
  const atLimit=!isPremium && activeCnt>=limit;
  const rows=(data||[]).map(s=>`<tr>
    <td><b>${esc(s.name)}</b>${s.id===state.staff.id?' <span class="tag t-confirmed">나</span>':''}</td>
    <td><select onchange="setStaffRole('${s.id}',this.value)" ${s.id===state.staff.id?'disabled':''} style="padding:6px;border:1px solid var(--line);border-radius:7px">${Object.entries(ROLE_LABEL).map(([k,v])=>`<option value="${k}" ${s.role===k?'selected':''}>${v}</option>`).join('')}</select></td>
    <td>${s.is_active?'<span class="tag t-done">활성</span>':'<span class="tag t-cancelled">비활성</span>'}</td>
    <td class="right"><button class="btn sm ghost" onclick="permModal('${s.id}')">메뉴권한</button> ${s.id===state.staff.id?'':`<button class="btn sm ghost" onclick="toggleStaff('${s.id}',${!s.is_active})">${s.is_active?'비활성화':'활성화'}</button>`}</td></tr>`).join('');
  const addBtn=(atLimit && !state.isPlatformAdmin)
    ? `<button class="btn ghost" style="opacity:.65" onclick="alert('무료 계정 한도(${limit}개)에 도달했습니다.\\n추가 계정은 팔로우코리아(플랫폼 관리자)에게 문의하세요.')">+ 직원 추가 (한도 초과)</button>`
    : `<button class="btn" onclick="staffModal()">+ 직원 추가</button>`;
  const platformCtl=state.platformMaster
    ? `<div class="panel"><div class="ph">플랫폼 관리자 · 계정 한도 (유료 추가)</div><div class="pb" style="padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="muted" style="font-size:13px">이 병원 무료 계정 한도</span><input id="staff_limit_in" type="number" min="1" value="${limit}" style="width:90px;padding:7px 9px;border:1px solid var(--line);border-radius:8px"><button class="btn sm" onclick="saveStaffLimit()">한도 저장</button><span class="muted" style="font-size:12px">현재 활성 ${activeCnt}명 · 유료 결제 확인 후 한도를 올려주세요</span></div></div>`
    : '';
  m.innerHTML=`<div class="page-head"><div><h2>직원 관리</h2><div class="sub">권한: 원장 / 매니저 / 데스크 / 열람 · ${isPremium?'계정 무제한 (프리미엄)':'무료 계정 '+limit+'개'}</div></div>
     <div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;font-weight:700;color:${atLimit?'#dc2626':'#0f766e'}">계정 ${activeCnt} / ${isPremium?'무제한':limit+'명'}${atLimit?' · 한도 초과':''}</span>${addBtn}</div></div>
   <div class="panel"><div class="pb"><table><thead><tr><th>이름</th><th>권한</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>
   ${platformCtl}
   <div class="panel"><div class="ph">권한 안내</div><div class="pb" style="padding:12px 16px;font-size:13px;line-height:1.9;color:var(--muted)">
     <b style="color:var(--ink)">원장</b> — 모든 메뉴·병원설정·직원관리 (전권)<br>
     <b style="color:var(--ink)">매니저</b> — 직원관리·병원설정 제외 전체 접근·편집 (정산·통계 포함)<br>
     <b style="color:var(--ink)">데스크</b> — 접수·예약·환자·상담견적·진료차트·수납 등 일선 업무<br>
     <b style="color:var(--ink)">열람</b> — 조회 전용 (데이터 편집 불가)<br>
     <span style="font-size:12px">※ '메뉴권한' 버튼에서 직원별로 노출 메뉴를 직접 체크해 지정할 수 있습니다(미선택 시 역할 기본값). 직원 추가 시 이메일/비밀번호 로그인 계정이 생성됩니다.</span></div></div>`;
}
function staffModal(){
  openModal(`<div class="mh">직원 추가<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="field"><label>이름 *</label><input id="s_name"></div>
    <div class="field"><label>로그인 이메일 *</label><input id="s_email" type="email" placeholder="staff@gangnam.clinic"></div>
    <div class="field"><label>초기 비밀번호 * (6자 이상)</label><input id="s_pw" type="text" value="pulse1234"></div>
    <div class="field"><label>권한</label><select id="s_role"><option value="manager">매니저</option><option value="desk" selected>데스크</option><option value="viewer">열람</option><option value="owner">원장</option></select></div>
    <div class="field"><label>노출 메뉴 (선택 안 하면 역할 기본값)</label><div id="s_menus" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${menuCheckboxes([])}</div></div>
    <div class="muted" style="font-size:12px">${ROLE_DESC}</div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="saveStaff()">계정 생성</button></div>`,true);
}
async function saveStaff(){
  const name=el('s_name').value.trim(),email=el('s_email').value.trim(),password=el('s_pw').value,role=el('s_role').value;
  if(!name||!email||!password){alert('이름/이메일/비밀번호를 입력하세요');return;}
  const {data,error}=await db.functions.invoke('create-staff',{body:{name,email,password,role}});
  if(error){let msg=error.message||error;try{const c=await error.context.json();if(c&&c.error)msg=c.error;}catch(e){}alert('생성 실패: '+msg);return;}
  if(data&&data.error){alert('생성 실패: '+data.error);return;}
  const menus=[...document.querySelectorAll('#s_menus input:checked')].map(i=>i.value);
  if(menus.length&&data&&data.id){await db.from('staff_accounts').update({menu_perms:menus}).eq('id',data.id);}
  logAudit('직원 추가',email+' ('+role+')');closeModal();renderStaff();alert('직원 계정이 생성되었습니다. ('+email+')');
}
async function setStaffRole(id,role){const {error}=await db.from('staff_accounts').update({role,updated_at:new Date().toISOString()}).eq('id',id);if(error)alert('실패: '+error.message);logAudit('직원 역할변경',role);renderStaff();}
async function toggleStaff(id,active){await db.from('staff_accounts').update({is_active:active,updated_at:new Date().toISOString()}).eq('id',id);logAudit('직원 '+(active?'활성화':'비활성화'));renderStaff();}

function hsImg(inputId,dataId,prevId){var f=document.getElementById(inputId);var file=f&&f.files&&f.files[0];if(!file)return;if(file.size>1500000)alert('이미지가 큽니다(1.5MB 이하 권장). 저장은 되지만 느릴 수 있어요.');var rd=new FileReader();rd.onload=function(){var d=rd.result;var dh=document.getElementById(dataId);if(dh)dh.value=d;var pv=document.getElementById(prevId);if(pv){pv.src=d;pv.style.display='';}};rd.readAsDataURL(file);}
function deviceListHtml(devs,stf){if(!devs||!devs.length)return '<div class="muted" style="font-size:12px">등록된 기기가 없습니다.</div>';return devs.map(function(d){var meta=((state.isPlatformAdmin&&stf&&stf[d.staff_id])?(esc(stf[d.staff_id])+' · '):'')+(d.last_seen?new Date(d.last_seen).toLocaleDateString('ko-KR'):'');return '<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)"><input id="dev_'+d.id+'" value="'+esc(d.device_label||'')+'" style="flex:1;min-width:120px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:12px"><span style="font-size:11px;color:#94a3b8;white-space:nowrap">'+meta+'</span><button class="btn sm ghost dev-rename" data-id="'+d.id+'">이름저장</button><button class="btn sm ghost dev-del" data-id="'+d.id+'" style="color:var(--danger)">삭제</button></div>';}).join('');}
document.addEventListener('click',function(e){if(!e.target||!e.target.closest)return;var rn=e.target.closest('.dev-rename');if(rn){renameDevice(rn.getAttribute('data-id'));return;}var dl=e.target.closest('.dev-del');if(dl){deleteDevice(dl.getAttribute('data-id'));return;}});
async function renameDevice(id){var inp=document.getElementById('dev_'+id);if(!inp)return;const {error}=await db.from('staff_devices').update({device_label:inp.value||''}).eq('id',id);if(error){alert('실패: '+error.message);return;}alert('기기 이름이 저장되었습니다.');}
async function deleteDevice(id){if(!confirm('이 기기를 삭제할까요? (해당 기기는 다음 로그인 시 다시 등록됩니다)'))return;const {error}=await db.from('staff_devices').delete().eq('id',id);if(error){alert('삭제 실패: '+error.message);return;}try{logAudit('기기 삭제',id);}catch(e){}renderSettings();}
async function saveGeoConfig(){var en=el('geo_enabled')?el('geo_enabled').checked:true;var arr=((el('geo_allowed')||{}).value||'').split(',').map(function(x){return x.trim().toUpperCase();}).filter(Boolean);if(arr.indexOf('KR')<0)arr.unshift('KR');const {error}=await db.from('geo_config').update({enabled:en,allowed_countries:arr,updated_at:new Date().toISOString()}).eq('id',1);if(error){alert('저장 실패: '+error.message);return;}try{logAudit('국가 접속제한 변경',{enabled:en,allowed:arr});}catch(e){}alert('저장되었습니다. Netlify 반영까지 1~2분 걸립니다.');}
async function saveSettings(){
  const name=el('h_name').value.trim();if(!name){alert('병원명을 입력하세요');return;}
  const contact={ceo:el('h_ceo').value||'',phone:el('h_phone').value||'',email:el('h_email').value||'',address:el('h_addr').value||'',logo:(el('h_logo_data')&&el('h_logo_data').value)||'',seal:(el('h_seal_data')&&el('h_seal_data').value)||'',plat_id:(el('h_plat_id')?el('h_plat_id').value||'':''),plat_pw:(el('h_plat_pw')?el('h_plat_pw').value||'':''),recall_days:(el('h_recall')?(parseInt(el('h_recall').value,10)||0):90)};
  const {error}=await db.from('hospitals').update({name,biz_no:el('h_biz').value||null,contact,updated_at:new Date().toISOString()}).eq('id',state.hospital_id);
  if(error){alert('저장 실패: '+error.message);return;}
  const kk=(el('h_kakao').value||'').trim();if(kk)localStorage.setItem('kakao_js_key',kk);else localStorage.removeItem('kakao_js_key');
  localStorage.setItem('alimtalk_on',el('h_alimtalk').checked?'1':'0');
  const atpl=(el('h_alimtalk_tpl').value||'').trim();if(atpl)localStorage.setItem('alimtalk_template',atpl);else localStorage.removeItem('alimtalk_template');
  state.hospital_name=name;el('hospName').textContent=name;logAudit('병원설정 저장',name);alert('저장되었습니다.');
}

/* ============ 거래명세서 ============ */
let stmtCtx={agencyId:null};
function stmtModal(agencyId){stmtCtx.agencyId=agencyId;const a=state.agencies.find(x=>x.id===agencyId);
  const now=new Date();const from=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);const to=now.toISOString().slice(0,10);
  openModal(`<div class="mh">거래명세서 · ${esc(a?a.name:'')}<span onclick="closeModal()">✕</span></div><div class="mb">
    <div class="grid2"><div class="field"><label>시작일</label><input id="st_from" type="date" value="${from}"></div>
      <div class="field"><label>종료일</label><input id="st_to" type="date" value="${to}"></div></div>
    <div class="field"><label><input type="checkbox" id="st_vat" checked> 금액에 부가세 포함(VAT 포함)으로 표기</label></div>
    <div class="muted" style="font-size:12px">해당 에이전시가 소개한 환자의 시술 내역을 기간별로 모아 거래명세서를 생성합니다.</div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn" onclick="genStatement()">명세서 출력</button><button class="btn" onclick="genStatement('excel')" style="background:#1D6F42;border-color:#1D6F42">엑셀</button></div>`);}
async function genStatement(mode){
  const a=state.agencies.find(x=>x.id===stmtCtx.agencyId);if(!a)return;
  if(!await useQuota('doc','명세서 발급')) return;
  const from=el('st_from').value,to=el('st_to').value,vat=el('st_vat').checked;
  let q=db.from('orders').select('id,order_no,order_date,patient_id').eq('agency_id',a.id).neq('status','cancelled');
  if(from)q=q.gte('order_date',from);
  if(to)q=q.lte('order_date',to+'T23:59:59');
  const {data:orders}=await q.order('order_date');
  const ids=(orders||[]).map(o=>o.id);let items=[];
  if(ids.length){const {data:it}=await db.from('order_items').select('*').in('order_id',ids);items=it||[];}
  const {data:hosp}=await db.from('hospitals').select('name,biz_no,contact').eq('id',state.hospital_id).single();
  const PM=pmap();const oMap=Object.fromEntries((orders||[]).map(o=>[o.id,o]));
  let lines=items.map(i=>{const o=oMap[i.order_id];return {date:o?o.order_date:null,patient:o?(PM[o.patient_id]||''):'',name:i.name,amount:Number(i.amount)};});
  lines.sort((x,y)=>new Date(x.date)-new Date(y.date));
  const total=lines.reduce((s,l)=>s+l.amount,0);
  const supply=vat?Math.round(total/1.1):total;const tax=vat?total-supply:0;
  const hc=(hosp&&hosp.contact)||{};
  const lineRows=lines.length?lines.map(l=>`<tr><td>${fdate(l.date)}</td><td>${esc(l.patient)}</td><td>${esc(l.name)}</td><td class="r">${won(l.amount)}</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">해당 기간 거래 내역이 없습니다.</td></tr>';
  const isPrelim=state.plan_tier!=='premium';
  const wm=isPrelim?'<div style="position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) rotate(-28deg);font-size:120px;font-weight:900;color:rgba(220,38,38,.07);letter-spacing:24px;z-index:0;pointer-events:none">예 비</div>':'';
  const titleBadge=isPrelim?' <span style="font-size:13px;color:#dc2626;border:1.5px solid #dc2626;border-radius:6px;padding:1px 8px;vertical-align:middle;letter-spacing:0;font-weight:700">예비</span>':'';
  const prelimNote=isPrelim?'<div class="note" style="color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:8px 10px;margin-top:10px">※ 본 문서는 <b>예비(가) 거래명세서</b>입니다. 국세청 정식 세금계산서 발행은 <b>프리미엄</b> 등급에서 지원됩니다.</div>':'';
  const html=`<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>거래명세서${isPrelim?'(예비)':''} - ${esc(a.name)}</title>
   <style>body{font-family:'Malgun Gothic','Pretendard',sans-serif;color:#0f172a;padding:30px;max-width:760px;margin:auto}
   h1{font-size:24px;text-align:center;margin:0 0 4px;letter-spacing:8px}.period{text-align:center;color:#64748b;font-size:13px;margin-bottom:18px}
   .party{display:flex;gap:14px;margin-bottom:14px}.party>div{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.7}
   .party h3{margin:0 0 6px;font-size:12px;color:#0f766e}
   table{width:100%;border-collapse:collapse;margin-top:6px}th,td{border:1px solid #e2e8f0;padding:8px;font-size:12.5px;text-align:left}
   th{background:#0f766e;color:#fff}.r{text-align:right}
   .sum{margin-top:12px;margin-left:auto;width:300px}.sum div{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
   .sum .big{font-size:18px;font-weight:800;border-top:2px solid #0f172a;padding-top:8px;margin-top:4px}
   .note{margin-top:14px;color:#64748b;font-size:12px}.foot{margin-top:28px;text-align:center;color:#94a3b8;font-size:12px}
   @media print{body{padding:0}}</style></head><body>${wm}
   <h1 style="position:relative;z-index:1">거 래 명 세 서${titleBadge}</h1><div class="period">${from||''} ~ ${to||''}</div>
   <div class="party">
     <div><h3>공급자 (병원)</h3><b>${esc((hosp&&hosp.name)||state.hospital_name)}</b><br>사업자번호: ${esc((hosp&&hosp.biz_no)||'-')}<br>연락처: ${esc(hc.phone||hc.tel||'-')}</div>
     <div><h3>공급받는자 (에이전시)</h3><b>${esc(a.biz_company||a.name)}</b><br>사업자번호: ${esc(a.biz_no||'-')} / 대표: ${esc(a.biz_ceo||'-')}<br>${a.biz_type?'업태/종목: '+esc(a.biz_type)+'<br>':''}${a.biz_address?'주소: '+esc(a.biz_address)+'<br>':''}담당: ${esc(a.contact_name||'-')} ${a.phone?'('+esc(a.phone)+')':''}</div>
   </div>
   <table><thead><tr><th>일자</th><th>환자</th><th>시술명</th><th class="r">금액</th></tr></thead><tbody>${lineRows}</tbody></table>
   <div class="sum">${vat?`<div><span>공급가액</span><span>${won(supply)}</span></div><div><span>부가세(10%)</span><span>${won(tax)}</span></div>`:''}<div class="big"><span>합계 ${vat?'(VAT 포함)':'(VAT 별도)'}</span><span>${won(total)}</span></div></div>
   <div class="note">※ 상기 금액은 ${vat?'부가가치세가 포함된':'부가가치세 별도의'} 금액입니다. 본 명세서는 ${esc(a.name)}가 소개한 환자의 시술 거래 내역입니다.</div>
   ${prelimNote}
   <div class="foot">${esc((hosp&&hosp.name)||state.hospital_name)} · 발행일 ${new Date().toLocaleDateString('ko-KR')}</div>
   </body></html>`;
  if(mode==='excel'){var _fn=String(((hosp&&hosp.name)||state.hospital_name||'병원')+'_'+a.name+'_'+new Date().toLocaleDateString('sv-SE')).split('/').join('_');var _e=function(x){return String(x==null?'':x).split('<').join('&lt;').split('>').join('&gt;');};var _rows=lines.map(function(l){return '<tr><td>'+_e(fdate(l.date))+'</td><td>'+_e(l.patient)+'</td><td>'+_e(l.name)+'</td><td>'+(l.amount||0)+'</td></tr>';}).join('');var _sum=(vat?('<tr><td colspan="3">공급가액</td><td>'+supply+'</td></tr><tr><td colspan="3">부가세(10%)</td><td>'+tax+'</td></tr>'):'')+'<tr><td colspan="3">합계'+(vat?'(VAT포함)':'(VAT별도)')+'</td><td>'+total+'</td></tr>';var _xls='<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1"><tr><td colspan="4">거래명세서 · '+_e(a.name)+' · '+_e(from)+'~'+_e(to)+'</td></tr><tr><th>일자</th><th>환자</th><th>시술명</th><th>금액</th></tr>'+_rows+_sum+'</table></body></html>';var _blob=new Blob(['\ufeff'+_xls],{type:'application/vnd.ms-excel;charset=utf-8'});var _al=document.createElement('a');_al.href=URL.createObjectURL(_blob);_al.download=_fn+'.xls';document.body.appendChild(_al);_al.click();document.body.removeChild(_al);logAudit('거래명세서 엑셀',a.name);closeModal();return;}
const w=window.open('','_blank','width=820,height=920');
  if(!w){alert('팝업이 차단되었습니다. 팝업을 허용해주세요.');return;}
  w.document.write(html);w.document.close();w.focus();setTimeout(function(){w.print();},350);logAudit('거래명세서 출력',a.name);closeModal();
}

boot(); /* build: v6 statement */
